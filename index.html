<script>
  // ======================
  // ADMIN SETTINGS
  // ======================
  const ADMIN_PASSWORD = "1234";

  function askPassword() {
    const pass = prompt("Enter Admin Password:");
    return pass === ADMIN_PASSWORD;
  }

  // ======================
  // NAVBAR (UNCHANGED)
  // ======================
  const navLinks = document.querySelectorAll('.nav-link');
  const indicator = document.querySelector('.nav-indicator');

  function moveIndicator(link) {
    const rect = link.getBoundingClientRect();
    const containerRect = link.parentElement.getBoundingClientRect();
    const left = rect.left - containerRect.left;
    indicator.style.left = left + 'px';
    indicator.style.width = rect.width + 'px';
    indicator.style.transform = 'scaleX(1)';
  }

  navLinks.forEach(link => {
    link.addEventListener('mouseenter', () => moveIndicator(link));
    link.addEventListener('click', () => {
      navLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });

  window.addEventListener('load', () => {
    const active = document.querySelector('.nav-link.active');
    if (active) moveIndicator(active);
  });

  // ======================
  // REVEAL ANIMATION
  // ======================
  const sections = document.querySelectorAll('section[id]');
  const revealEls = document.querySelectorAll('.reveal');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const id = entry.target.getAttribute('id');
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        navLinks.forEach(link => {
          const hrefId = link.getAttribute('href').slice(1);
          if (hrefId === id) {
            navLinks.forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            moveIndicator(link);
          }
        });
      }
    });
  }, { threshold: 0.25 });

  sections.forEach(section => observer.observe(section));
  revealEls.forEach(el => observer.observe(el));

  // ======================
  // GALLERY HOVER EFFECT
  // ======================
  function applyHoverEffect(card) {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const rotateX = ((y / rect.height) - 0.5) * -8;
      const rotateY = ((x / rect.width) - 0.5) * 8;
      card.style.transform =
        `translateY(-8px) scale(1.03) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  }

  document.querySelectorAll('.gallery-card').forEach(applyHoverEffect);

  // ======================
  // ADD DELETE BUTTON TO EXISTING IMAGES
  // ======================
  function addDeleteButton(card) {
    const meta = card.querySelector('.gallery-meta');

    const btn = document.createElement("button");
    btn.textContent = "Delete";
    btn.style.background = "red";
    btn.style.color = "white";
    btn.style.border = "none";
    btn.style.padding = "4px 8px";
    btn.style.borderRadius = "6px";
    btn.style.cursor = "pointer";

    btn.onclick = (e) => {
      e.preventDefault();
      if (!askPassword()) return alert("Wrong Password");
      card.remove();
      updateFolderCounts();
    };

    meta.appendChild(btn);
  }

  document.querySelectorAll('.gallery-card').forEach(addDeleteButton);

  // ======================
  // ADD UPLOAD BUTTON TO EACH FOLDER
  // ======================
  function setupUploadButtons() {
    document.querySelectorAll('.folder-header').forEach(header => {
      const btn = document.createElement("button");
      btn.innerHTML = '<i class="fas fa-upload"></i> Upload';
      btn.className = "cta-secondary";

      btn.onclick = () => {
        if (!askPassword()) return alert("Wrong Password");

        const input = document.createElement("input");
        input.type = "file";
        input.multiple = true;
        input.accept = "image/*";

        input.onchange = (e) => {
          const files = e.target.files;
          const folder = header.closest(".folder");
          const grid = folder.querySelector(".gallery-grid");

          Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function (event) {
              const card = document.createElement("a");
              card.className = "gallery-card";
              card.href = event.target.result;
              card.target = "_blank";

              card.innerHTML = `
                <img src="${event.target.result}">
                <div class="gallery-meta">
                  <span>New</span>
                </div>
              `;

              applyHoverEffect(card);
              addDeleteButton(card);

              grid.appendChild(card);
              updateFolderCounts();
            };
            reader.readAsDataURL(file);
          });
        };

        input.click();
      };

      header.appendChild(btn);
    });
  }

  // ======================
  // ADD NEW FOLDER
  // ======================
  function setupAddFolder() {
    const btn = document.createElement("button");
    btn.innerHTML = '<i class="fas fa-folder-plus"></i> Add Folder';
    btn.className = "cta-btn";
    btn.style.marginBottom = "20px";

    document.querySelector("#gallery").prepend(btn);

    btn.onclick = () => {
      if (!askPassword()) return alert("Wrong Password");

      const name = prompt("Folder name?");
      if (!name) return;

      const id = name.toLowerCase().replace(/\s+/g, '-');

      // tab
      const tab = document.createElement("button");
      tab.className = "tab-btn";
      tab.dataset.folder = id;
      tab.innerHTML = `<i class="fas fa-folder"></i> ${name}`;
      document.querySelector(".gallery-tabs").appendChild(tab);

      // folder
      const folder = document.createElement("div");
      folder.className = "folder";
      folder.dataset.folder = id;

      folder.innerHTML = `
        <div class="folder-header">
          <h3>${name}</h3>
          <span class="folder-count">0 photos</span>
        </div>
        <div class="gallery-grid"></div>
      `;

      document.querySelector(".folders-grid").appendChild(folder);

      location.reload();
    };
  }

  // ======================
  // FOLDER SWITCHING (UNCHANGED)
  // ======================
  const tabBtns = document.querySelectorAll('.tab-btn');
  const folders = document.querySelectorAll('.folder');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.folder;

      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      folders.forEach(folder => {
        folder.classList.remove('active');
        if (folder.dataset.folder === name) {
          folder.classList.add('active');
        }
      });
    });
  });

  // ======================
  // COUNT UPDATE
  // ======================
  function updateFolderCounts() {
    document.querySelectorAll('.folder-count').forEach(el => {
      const folder = el.closest('.folder');
      const count = folder.querySelectorAll('.gallery-card').length;
      el.textContent = `${count} photo${count !== 1 ? 's' : ''}`;
    });
  }

  // ======================
  // INIT
  // ======================
  window.addEventListener('load', () => {
    updateFolderCounts();
    setupUploadButtons();
    setupAddFolder();
  });
</script>
