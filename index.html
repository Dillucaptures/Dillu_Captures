<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Montserrat;
  color:#fff;
  background:#000;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.35);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#bbb;
  margin:0 10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:70px;
  color:#f5c542;
}

/* 🔥 MOVE UP MORE */
section{
  padding:60px 8% 40px;
}

/* FOLDERS UI 🔥 */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.folder{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(245,197,66,0.3);
  padding:30px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

/* Folder tab look */
.folder::before{
  content:"";
  position:absolute;
  top:-8px;
  left:20px;
  width:40px;
  height:12px;
  background:#f5c542;
  border-radius:5px 5px 0 0;
}

.folder:hover{
  background:rgba(245,197,66,0.1);
  transform:translateY(-5px);
}

/* GALLERY */
.gallery{
  margin-top:20px;
  column-count:5;
  column-gap:12px;
}

.card{
  break-inside:avoid;
  margin-bottom:12px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="go('home')">Home</a>
    <a onclick="go('about')">About</a>
    <a onclick="go('portfolio')">Portfolio</a>
  </div>
</nav>

<div class="hero" id="home">
  <h1>Dillu Captures</h1>
  <p>"Preserving the beauty of a moment."</p>
</div>

<section id="about">
  <h2>About</h2>
  <p>Premium cinematic photography studio.</p>
</section>

<section id="portfolio">
  <h2>Folders</h2>

  <div class="folders">
    <div class="folder" onclick="openFolder(this,'kids')">📸 Kids</div>
    <div class="folder" onclick="openFolder(this,'outdoor')">🤰 Maternity</div>
    <div class="folder" onclick="openFolder(this,'cars')">🚗 Cars</div>
    <div class="folder" onclick="openFolder(this,'haldi')">🌼 Haldi</div>
    <div class="folder" onclick="openFolder(this,'temples')">🛕 Temples</div>
    <div class="folder" onclick="openFolder(this,'pets')">🐾 Pets</div>
  </div>

  <!-- 🔥 MASTER GALLERY (DYNAMIC INSERT HERE) -->
  <div id="displayArea"></div>

  <!-- HIDDEN ORIGINAL GALLERIES -->
  <div id="kids" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/Kids/20240813114300_IMG_0855.webp" onclick="openImg(this)"></div>
      <div class="card"><img src="Images/Kids/20240813111851_IMG_0813.webp" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="cars" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/Cars&Bikes/IMG_6597.jpg" onclick="openImg(this)"></div>
      <div class="card"><img src="Images/Cars&Bikes/IMG_6611.jpg" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="outdoor" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/Maternity Shoot/IMG_4265.webp" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="haldi" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/Haldi/IMG_3059.webp" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="temples" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/temples/1.jpg" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="pets" style="display:none">
    <div class="gallery">
      <div class="card"><img src="Images/pets/1.jpg" onclick="openImg(this)"></div>
    </div>
  </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>

/* NAV */
function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* 🔥 OPEN BELOW CLICKED FOLDER */
function openFolder(el,id){

  let display=document.getElementById("displayArea");

  if(display.dataset.open===id){
    display.innerHTML="";
    display.dataset.open="";
    return;
  }

  let content=document.getElementById(id).innerHTML;
  display.innerHTML=content;
  display.dataset.open=id;

  el.scrollIntoView({behavior:"smooth",block:"center"});
}

/* IMAGE VIEW */
function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightImg").src=img.src;
}

</script>

</body>
</html>
