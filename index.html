<script>
/* KEEP YOUR EXISTING JS */

/* Gallery Folder System (works same) */
const tabBtns = document.querySelectorAll('.tab-btn');
const folders = document.querySelectorAll('.folder');

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const folderName = btn.dataset.folder;

    tabBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    folders.forEach(folder => {
      folder.classList.remove('active');
      if (folder.dataset.folder === folderName) {
        folder.classList.add('active');
      }
    });

    updateFolderCounts();
  });
});

function updateFolderCounts() {
  document.querySelectorAll('.folder-count').forEach(countEl => {
    const folder = countEl.closest('.folder');
    const photoCount = folder.querySelectorAll('.gallery-card').length;
    countEl.textContent = `${photoCount} photo${photoCount !== 1 ? 's' : ''}`;
  });
}

window.addEventListener('load', updateFolderCounts);
</script>
