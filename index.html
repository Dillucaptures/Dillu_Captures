<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Montserrat;
  color:#fff;
  background:#000;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
}

.logo{
  font-family:Dancing Script;
  font-size:28px;
  color:#f5c542;
}

nav a{
  color:#ddd;
  margin:0 10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:80px;
  color:#f5c542;
}

.hero p{
  margin-top:10px;
  font-size:18px;
}

/* SECTION */
section{
  padding:60px 8% 40px;
}

h2{
  color:#f5c542;
  margin-bottom:10px;
}

/* FOLDERS */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.4);
  padding:25px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:.3s;
}

/* TAB LOOK */
.folder::before{
  content:"";
  position:absolute;
  top:-8px;
  left:20px;
  width:40px;
  height:12px;
  background:#f5c542;
  border-radius:5px 5px 0 0;
}

.folder:hover{
  transform:translateY(-5px);
  background:rgba(245,197,66,0.15);
}

/* GALLERY */
.gallery{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

.card{
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="go('home')">Home</a>
    <a onclick="go('about')">About</a>
    <a onclick="go('portfolio')">Portfolio</a>
  </div>
</nav>

<div class="hero" id="home">
  <h1>Dillu Captures</h1>
  <p>"Preserving the beauty of a moment."</p>
</div>

<section id="about">
  <h2>About</h2>
  <p>Premium cinematic photography studio.</p>
</section>

<section id="portfolio">
  <h2>Folders</h2>

  <div class="folders">

    <div class="folder" onclick="openFolder(this,'kids')">📸 Kids</div>
    <div class="folder" onclick="openFolder(this,'maternity')">🤰 Maternity</div>
    <div class="folder" onclick="openFolder(this,'cars')">🚗 Cars</div>
    <div class="folder" onclick="openFolder(this,'haldi')">🌼 Haldi</div>
    <div class="folder" onclick="openFolder(this,'temples')">🛕 Temples</div>
    <div class="folder" onclick="openFolder(this,'pets')">🐾 Pets</div>

  </div>

  <!-- HIDDEN DATA -->

  <div id="kids" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1607457561901-e6ec3a6d16cf" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="maternity" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="cars" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="haldi" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="temples" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="pets" style="display:none">
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d" onclick="openImg(this)"></div>
    </div>
  </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>

function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* 🔥 PERFECT BELOW FOLDER */
let activeGallery=null;

function openFolder(el,id){

  if(activeGallery){
    activeGallery.remove();
    activeGallery=null;
  }

  if(el.classList.contains("active")){
    el.classList.remove("active");
    return;
  }

  document.querySelectorAll(".folder").forEach(f=>f.classList.remove("active"));
  el.classList.add("active");

  let content=document.getElementById(id).innerHTML;
  let box=document.createElement("div");
  box.innerHTML=content;

  el.insertAdjacentElement("afterend",box);

  activeGallery=box;
}

/* LIGHTBOX */
function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightImg").src=img.src;
}

</script>

</body>
</html>
