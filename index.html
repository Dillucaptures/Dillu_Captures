<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    url("https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  opacity:0.10;
  filter: blur(2px);
  z-index:-3;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,200,100,0.20), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,160,255,0.15), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(255,80,120,0.12), transparent 55%);
  filter: blur(80px);
  z-index:-2;
}

/* ================= NAV ================= */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 20px;
  border-radius:18px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(22px);

  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#bbb;
  text-decoration:none;
  margin:0 10px;
  font-size:12px;
  letter-spacing:1px;
  padding:6px 10px;
  border-radius:10px;
  transition:0.3s;
  cursor:pointer;
}

nav a:hover,
nav a.active{
  background:rgba(255,255,255,0.12);
  color:#fff;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;

  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.hero.show{
  opacity:1;
  transform:translateY(0);
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#f5c542;
}

/* ================= SECTIONS ================= */
section{
  padding:100px 10%;
  opacity:0;
  transform:translateY(60px);
  transition:1s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* ================= ABOUT ================= */
.about{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:40px;
}

/* ================= FILTERS ================= */
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.filters button{
  padding:10px 18px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#ccc;
  cursor:pointer;
}

.filters button.active{
  background:#f5c542;
  color:#000;
}

/* ================= GALLERY ================= */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
}

.card{
  border-radius:18px;
  overflow:hidden;
  position:relative;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  height:270px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img{
  transform:scale(1.12);
  filter:brightness(1.1);
}

/* ================= CONTACT ================= */
.contact{
  text-align:center;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:30px;
  color:#666;
  font-size:12px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="goTo('home')" class="active">Home</a>
    <a onclick="goTo('about')">About</a>
    <a onclick="goTo('portfolio')">Portfolio</a>
    <a onclick="goTo('contact')">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>Dillu Captures</h1>
  <p>Luxury cinematic photography capturing emotion and timeless memories.</p>
</div>

<!-- ABOUT -->
<section id="about">
  <div class="about">
    <h2>About Me</h2>
    <p>I specialize in cinematic portrait photography with storytelling light.</p>
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">

  <h2>Portfolio</h2>

  <div class="filters">
    <button class="active" onclick="filter('all')">All</button>
    <button onclick="filter('kids')">Kids</button>
    <button onclick="filter('haldi')">Haldi</button>
    <button onclick="filter('outdoor')">Outdoor</button>
    <button onclick="filter('bikes')">Bikes</button>
    <button onclick="filter('portraits')">Portraits</button>
  </div>

  <div class="gallery">
    <div class="card kids"><img src="Images/kids/1.jpg"></div>
    <div class="card haldi"><img src="Images/haldi/1.jpg"></div>
    <div class="card outdoor"><img src="Images/outdoor/1.jpg"></div>
    <div class="card bikes"><img src="Images/bikes/1.jpg"></div>
    <div class="card portraits"><img src="Images/portraits/1.jpg"></div>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact">
    <h2>Contact</h2>
    <p>dillucapture@gmail.com | +91 9700034138</p>
  </div>
</section>

<footer>© 2026 Dillu Captures</footer>

<script>

/* ================= SMOOTH NAV SCROLL + ACTIVE ================= */
function goTo(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});

  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  event.target.classList.add("active");
}

/* ================= SCROLL REVEAL (FRAMER STYLE) ================= */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:0.15});

document.querySelectorAll(".hero, section, .card").forEach(el=>{
  observer.observe(el);
});

/* ================= FILTER ================= */
function filter(cat){
  let cards=document.querySelectorAll('.card');
  let btns=document.querySelectorAll('.filters button');

  btns.forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  cards.forEach(c=>{
    c.style.display=(cat==='all'||c.classList.contains(cat))?"block":"none";
  });
}
</script>

</body>
</html>
