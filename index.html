<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* 🌌 BACKGROUND */
body{
  margin:0;
  font-family:Montserrat;
  color:#fff;
  background: radial-gradient(circle at 20% 20%, #0f172a, #000);
  overflow-x:hidden;
}

/* glowing gradient blobs */
body::before{
  content:"";
  position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(255,215,0,0.15), transparent);
  top:-100px; left:-100px;
  filter:blur(120px);
}

body::after{
  content:"";
  position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(59,130,246,0.15), transparent);
  bottom:-100px; right:-100px;
  filter:blur(120px);
}

/* 🍏 GLASS */
.glass{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:25px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.15),
    0 20px 60px rgba(0,0,0,0.7);
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:center;
  z-index:1000;
}
nav .glass{
  margin-top:12px;
  padding:12px 25px;
  display:flex;
  gap:25px;
  border-radius:50px;
}

/* LINKS */
a{color:#aaa;text-decoration:none}
a:hover{color:#fff}

/* SECTION */
section{
  max-width:1100px;
  margin:120px auto;
  padding:30px;
}

/* HERO */
#home{text-align:center}
#home h1{
  font-size:48px;
  background:linear-gradient(90deg,gold,#f97316);
  -webkit-background-clip:text;
  color:transparent;
}
#home p{color:#ccc}

/* TABS */
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tab{
  padding:8px 18px;
  border-radius:30px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}
.tab.active{
  background:linear-gradient(135deg,gold,orange);
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  transition:0.4s;
}
.card img{
  width:100%;
  border-radius:20px;
}
.card:hover{
  transform:translateY(-8px) scale(1.03);
}

/* BUTTON */
.btn{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  margin:4px;
}

.upload{background:linear-gradient(135deg,gold,orange);color:black}
.delete{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.download{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white}
.addFolder{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}

/* DROP ZONE */
.drop{
  padding:25px;
  border-radius:20px;
  border:1px dashed rgba(255,255,255,0.3);
  text-align:center;
  margin-bottom:15px;
}

/* PROGRESS */
.progressBox{display:none;margin-top:10px}
.progressBar{
  height:10px;
  width:0%;
  border-radius:10px;
  background:linear-gradient(90deg,gold,orange);
}

/* CONTACT */
.contact-icons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}
.contact-icons a{
  padding:10px 16px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  display:flex;
  gap:8px;
  align-items:center;
}
.contact-icons a:hover{
  background:linear-gradient(135deg,gold,orange);
  color:black;
}

/* MOBILE */
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<nav>
  <div class="glass">
    <a href="#home">Home</a>
    <a href="#gallery">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section id="home" class="glass">
  <h1>Dillu Captures</h1>
  <p>Premium photography with emotional storytelling ✨</p>
</section>

<section id="gallery" class="glass">
  <h2>Gallery</h2>

  <div style="display:flex;justify-content:space-between;">
    <div class="tabs" id="tabs"></div>
    <button class="btn addFolder" onclick="addFolder()">+ Folder</button>
  </div>

  <div id="folders"></div>
</section>

<section id="about" class="glass">
  <h2>About</h2>
  <p>Dillu Captures specializes in emotional, premium photography experiences.</p>
</section>

<section id="contact" class="glass">
  <h2>Contact</h2>
  <p><i class="fas fa-envelope"></i> Dillucapture@gmail.com</p>
  <p><i class="fas fa-phone"></i> +91 9700034138</p>

  <div class="contact-icons">
    <a href="mailto:Dillucapture@gmail.com"><i class="fas fa-envelope"></i>Email</a>
    <a href="tel:9700034138"><i class="fas fa-phone"></i>Call</a>
    <a href="https://wa.me/919700034138"><i class="fab fa-whatsapp"></i>WhatsApp</a>
    <a href="#"><i class="fab fa-instagram"></i>Instagram</a>
  </div>
</section>

<script>
const ADMIN_PASSWORD="1234";

let data=JSON.parse(localStorage.getItem("galleryData"))||{
  folders:{All:[]},
  active:"All"
};

function save(){localStorage.setItem("galleryData",JSON.stringify(data));}
function checkAdmin(){return prompt("Admin Password")==ADMIN_PASSWORD;}

function render(){
  let tabs=document.getElementById("tabs");
  let folders=document.getElementById("folders");

  tabs.innerHTML="";
  folders.innerHTML="";

  Object.keys(data.folders).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab "+(data.active===name?"active":"");
    tab.innerText=name;
    tab.onclick=()=>{data.active=name;render();}
    tabs.appendChild(tab);

    if(data.active===name){
      let container=document.createElement("div");

      container.innerHTML=`
        <h3>${name}</h3>
        <div class="drop" id="dropZone">
          Drag & Drop Images
          <br><br>
          <button class="btn upload" onclick="uploadImage('${name}')">Browse</button>
        </div>

        <div class="progressBox" id="progressBox">
          <div style="background:#111;border-radius:10px;">
            <div class="progressBar" id="progressBar"></div>
          </div>
          <small id="progressText"></small>
        </div>
      `;

      let grid=document.createElement("div");
      grid.className="grid";

      data.folders[name].forEach((img,i)=>{
        let card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
          <img src="${img}">
          <div>
            <button class="btn download" onclick="downloadImage('${img}',${i})">Download</button>
            <button class="btn delete" onclick="deleteImage('${name}',${i})">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });

      container.appendChild(grid);
      folders.appendChild(container);

      setupDragDrop(name);
    }
  });
}

function downloadImage(img,i){
  let a=document.createElement("a");
  a.href=img;
  a.download="photo_"+i+".jpg";
  a.click();
}

function setupDragDrop(folder){
  let drop=document.getElementById("dropZone");

  drop.ondragover=e=>{e.preventDefault();drop.style.background="rgba(255,255,255,0.1)";}
  drop.ondragleave=()=>drop.style.background="transparent";

  drop.ondrop=e=>{
    e.preventDefault();
    drop.style.background="transparent";
    if(!checkAdmin()) return alert("Wrong password");
    handleFiles(e.dataTransfer.files,folder);
  };
}

function uploadImage(folder){
  if(!checkAdmin()) return alert("Wrong password");

  let input=document.createElement("input");
  input.type="file";
  input.multiple=true;

  input.onchange=e=>handleFiles(e.target.files,folder);
  input.click();
}

function handleFiles(files,folder){
  let bar=document.getElementById("progressBar");
  let box=document.getElementById("progressBox");
  let text=document.getElementById("progressText");

  box.style.display="block";

  let total=files.length,count=0;

  Array.from(files).forEach(file=>{
    let reader=new FileReader();
    reader.onload=()=>{
      data.folders[folder].push(reader.result);
      count++;
      bar.style.width=(count/total*100)+"%";
      text.innerText=`Uploading ${count}/${total}`;

      if(count===total){
        save();
        render();
      }
    };
    reader.readAsDataURL(file);
  });
}

function deleteImage(folder,i){
  if(!checkAdmin()) return alert("Wrong password");
  data.folders[folder].splice(i,1);
  save();
  render();
}

function addFolder(){
  if(!checkAdmin()) return alert("Wrong password");

  let name=prompt("Folder name?");
  if(!name) return;

  if(data.folders[name]) return alert("Exists");

  data.folders[name]=[];
  data.active=name;
  save();
  render();
}

render();
</script>

</body>
</html>
