<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Portfolio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  scroll-behavior:smooth;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:#111;
  z-index:1000;
}
.navbar a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* SECTIONS */
section{
  padding:100px 20px;
  min-height:100vh;
}

/* GALLERY */
#gallery{padding-top:120px;}

.gallery-tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab-btn{
  padding:10px 15px;
  border:1px solid #444;
  background:#222;
  color:#fff;
  cursor:pointer;
  border-radius:20px;
  transition:0.3s;
}
.tab-btn.active{
  background:gold;
  color:#000;
}

/* FOLDERS */
.folder{display:none; animation:fade 0.5s ease;}
.folder.active{display:block;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

.gallery-card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
.gallery-card img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
.lightbox.active{display:flex;}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#gallery">Portfolio</a>
  <a href="#contact">Contact</a>
</div>

<!-- HOME -->
<section id="home">
  <h1>Home Section</h1>
</section>

<!-- ABOUT -->
<section id="about">
  <h1>About Section</h1>
</section>

<!-- GALLERY -->
<section id="gallery">

<h1>Portfolio</h1>

<!-- TABS -->
<div class="gallery-tabs">
  <button class="tab-btn active" data-folder="all">All</button>
  <button class="tab-btn" data-folder="kids">Kids</button>
  <button class="tab-btn" data-folder="haldi">Haldi</button>
  <button class="tab-btn" data-folder="street">Street</button>
</div>

<!-- ALL -->
<div class="folder active" data-folder="all">
  <div class="gallery-grid">
    <div class="gallery-card"><img loading="lazy" src="Images/1.webp"></div>
    <div class="gallery-card"><img loading="lazy" src="Images/2.webp"></div>
    <div class="gallery-card"><img loading="lazy" src="Images/3.webp"></div>
  </div>
</div>

<!-- KIDS -->
<div class="folder" data-folder="kids">
  <div class="gallery-grid">
    <div class="gallery-card"><img loading="lazy" src="Images/kids/1.webp"></div>
    <div class="gallery-card"><img loading="lazy" src="Images/kids/2.webp"></div>
  </div>
</div>

<!-- HALDI -->
<div class="folder" data-folder="haldi">
  <div class="gallery-grid">
    <div class="gallery-card"><img loading="lazy" src="Images/haldi/1.webp"></div>
    <div class="gallery-card"><img loading="lazy" src="Images/haldi/2.webp"></div>
  </div>
</div>

<!-- STREET -->
<div class="folder" data-folder="street">
  <div class="gallery-grid">
    <div class="gallery-card"><img loading="lazy" src="Images/street/1.webp"></div>
    <div class="gallery-card"><img loading="lazy" src="Images/street/2.webp"></div>
  </div>
</div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h1>Contact Section</h1>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>

// TAB SWITCH
const tabs = document.querySelectorAll(".tab-btn");
const folders = document.querySelectorAll(".folder");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const target = tab.dataset.folder;

    folders.forEach(f=>{
      f.classList.remove("active");
      if(f.dataset.folder === target){
        f.classList.add("active");
      }
    });
  });
});

// LIGHTBOX
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

document.querySelectorAll(".gallery-card img").forEach(img=>{
  img.addEventListener("click",()=>{
    lightbox.classList.add("active");
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click",()=>{
  lightbox.classList.remove("active");
});

</script>

</body>
</html>
