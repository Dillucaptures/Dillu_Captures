<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* THEME */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family: 'Inter';
  background: var(--bg);
  color: var(--text);
  transition: .3s;
}

/* NAV */
header {
  position: fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter: blur(15px);
  background: var(--glass);
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:var(--text);
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  padding:120px 60px;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover;
}

/* SECTIONS */
section { padding:100px 60px; }

/* CALENDAR */
.calendar {
  max-width:400px;
  margin:auto;
  text-align:center;
}

.days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  margin-top:20px;
}

.day {
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  background:var(--glass);
}

.day:hover {
  background:#111;
  color:#fff;
}

/* SLOTS */
.slots {
  margin-top:20px;
}

.slot {
  padding:10px;
  margin:8px;
  border-radius:20px;
  background:var(--glass);
  cursor:pointer;
  display:inline-block;
}

.slot:hover {
  background:#111;
  color:#fff;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 25px;
  background:var(--glass);
  border-radius:30px;
  text-decoration:none;
  color:var(--text);
  margin-top:20px;
}

/* MOBILE */
@media(max-width:768px){
  header { padding:15px 20px; }
  section { padding:80px 20px; }
  .hero { flex-direction:column; }
  .hero::after { width:100%; height:50%; }
}

</style>
</head>

<body>

<header>
  <h2>Dillu_Captures</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#booking">Booking</a>
    <a href="#contact">Contact</a>
    <span onclick="toggleTheme()" style="cursor:pointer;">☾</span>
  </nav>
</header>

<section class="hero">
  <div>
    <h1 style="font-family:Playfair Display;">Luxury Photography</h1>
    <p>Book your shoot in seconds</p>
  </div>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2 style="text-align:center;">Select Your Date</h2>

  <div class="calendar">
    <div class="days" id="days"></div>

    <div class="slots" id="slots"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" style="text-align:center;">
  <h2>Contact</h2>
  <a class="btn" href="https://instagram.com">Instagram</a>
</section>

<script>

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* CALENDAR GENERATE */
const daysContainer = document.getElementById("days");
const slotsContainer = document.getElementById("slots");

for(let i=1;i<=30;i++){
  const day = document.createElement("div");
  day.className="day";
  day.innerText=i;

  day.onclick = () => showSlots(i);
  daysContainer.appendChild(day);
}

/* SLOTS */
function showSlots(date){
  slotsContainer.innerHTML="";

  const times = ["10:00 AM","12:00 PM","3:00 PM","6:00 PM"];

  times.forEach(time=>{
    const slot = document.createElement("div");
    slot.className="slot";
    slot.innerText=time;

    slot.onclick = () => book(date,time);
    slotsContainer.appendChild(slot);
  });
}

/* BOOK */
function book(date,time){
  const msg = `Hi, I want to book a shoot on ${date} at ${time}`;
  window.open(`https://wa.me/919700034138?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
