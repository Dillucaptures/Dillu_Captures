<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Montserrat;
  color:#fff;
  background:#000;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
}

.logo{
  font-family:Dancing Script;
  font-size:28px;
  color:#f5c542;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:80px;
  color:#f5c542;
}

/* SECTION */
section{
  padding:60px 8% 40px;
}

h2{
  color:#f5c542;
  margin-bottom:15px;
}

/* FOLDER GRID */
.folder-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* FOLDER */
.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.3);
  padding:30px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:.3s;
}

.folder::before{
  content:"";
  position:absolute;
  top:-8px;
  left:20px;
  width:45px;
  height:14px;
  background:#f5c542;
  border-radius:6px 6px 0 0;
}

.folder:hover{
  transform:translateY(-6px);
  background:rgba(245,197,66,0.15);
}

.folder.active{
  background:rgba(245,197,66,0.2);
}

/* 🔥 GALLERY */
.gallery-wrap{
  grid-column:1/-1;
}

.gallery{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(5, 1fr); /* 🔥 5 IMAGES PER ROW */
  gap:12px;
}

/* IMAGE */
.card{
  overflow:hidden;
  border-radius:12px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:auto;   /* 🔥 AUTO SIZE */
  display:block;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
</nav>

<div class="hero">
  <h1>Dillu Captures</h1>
</div>

<section>
  <h2>Folders</h2>

  <div class="folder-grid" id="grid">
    <div class="folder" onclick="openFolder(this,'kids')">📸 Kids</div>
    <div class="folder" onclick="openFolder(this,'cars')">🚗 Cars</div>
  </div>

  <!-- DATA -->

  <div id="kids" hidden>
    <div class="gallery">
      <div class="card"><img src="https://picsum.photos/400/300?1" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/500?2" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/350?3" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/600?4" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/320?5" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/450?6" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/370?7" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/520?8" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/390?9" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/480?10" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="cars" hidden>
    <div class="gallery">
      <div class="card"><img src="https://picsum.photos/400/300?11" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/500?12" onclick="openImg(this)"></div>
    </div>
  </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>

let activeBox=null;

function openFolder(el,id){

  if(activeBox){
    activeBox.remove();
    activeBox=null;
  }

  if(el.classList.contains("active")){
    el.classList.remove("active");
    return;
  }

  document.querySelectorAll(".folder").forEach(f=>f.classList.remove("active"));
  el.classList.add("active");

  let content=document.getElementById(id).innerHTML;

  let wrap=document.createElement("div");
  wrap.className="gallery-wrap";
  wrap.innerHTML=content;

  el.insertAdjacentElement("afterend",wrap);

  activeBox=wrap;
}

function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightImg").src=img.src;
}

</script>

</body>
</html>
