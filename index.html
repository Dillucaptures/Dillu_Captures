<!-- FINAL PREMIUM VERSION: SAME UI + ADMIN + FOLDERS + ADD FOLDER -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
h1{text-align:center;margin:20px}

.top-bar{
  text-align:center;margin-bottom:20px;
}

button{
  padding:10px 16px;border:none;border-radius:20px;cursor:pointer;margin:5px
}

.add-folder{background:#22c55e;color:#000}
.upload-btn{background:#eab308;color:#000}
.delete-btn{
  position:absolute;top:5px;right:5px;
  background:red;color:#fff;border:none;border-radius:50%;width:26px;height:26px
}

.folder{
  margin:30px;padding:20px;border:1px solid #333;border-radius:16px
}

.gallery{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center
}

.card{position:relative}
.card img{
  width:220px;height:150px;object-fit:cover;border-radius:10px
}

</style>
</head>

<body>

<h1>Dillu Captures</h1>

<div class="top-bar">
  <button class="add-folder" onclick="createFolder()">➕ Add Folder</button>
</div>

<div id="folders"></div>

<script>

const ADMIN_PASSWORD = "dillu123";

function checkPassword(){
  return prompt("Enter Admin Password") === ADMIN_PASSWORD;
}

function createFolder(){
  if(!checkPassword()) return alert("Wrong Password");

  const name = prompt("Enter Folder Name");
  if(!name) return;

  const id = name.toLowerCase().replace(/\s+/g,'_');

  const container = document.getElementById('folders');

  const div = document.createElement('div');
  div.className = 'folder';
  div.innerHTML = `
    <h2>${name}</h2>
    <button class="upload-btn" onclick="uploadImage('${id}')">Upload Photo</button>
    <div class="gallery" id="${id}"></div>
  `;

  container.appendChild(div);

  localStorage.setItem('folder_'+id, name);
}

function uploadImage(folder){
  if(!checkPassword()) return alert("Wrong Password");

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
      const src = event.target.result;
      addImage(folder, src);
      saveLocal(folder, src);
    }

    reader.readAsDataURL(file);
  }

  input.click();
}

function addImage(folder, src){
  const container = document.getElementById(folder);

  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  const del = document.createElement('button');
  del.innerHTML = '×';
  del.className = 'delete-btn';

  del.onclick = ()=>{
    if(!checkPassword()) return alert("Wrong Password");
    card.remove();
    removeLocal(folder, src);
  }

  card.appendChild(img);
  card.appendChild(del);
  container.appendChild(card);
}

function saveLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data.push(src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function removeLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data = data.filter(i=>i!==src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function load(){
  const container = document.getElementById('folders');

  for(let key in localStorage){
    if(key.startsWith('folder_')){
      const id = key.replace('folder_','');
      const name = localStorage.getItem(key);

      const div = document.createElement('div');
      div.className = 'folder';
      div.innerHTML = `
        <h2>${name}</h2>
        <button class="upload-btn" onclick="uploadImage('${id}')">Upload Photo</button>
        <div class="gallery" id="${id}"></div>
      `;

      container.appendChild(div);

      let images = JSON.parse(localStorage.getItem(id)) || [];
      images.forEach(src=>addImage(id, src));
    }
  }
}

load();

</script>

</body>
</html>
