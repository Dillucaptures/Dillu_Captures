<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  color:#fff;
  overflow-x:hidden;
}

/* CINEMATIC BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.35);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(245,197,66,0.15), transparent 50%),
             radial-gradient(circle at bottom, rgba(0,0,0,0.9), transparent 60%);
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(18px);
  border:1px solid rgba(245,197,66,0.2);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#bbb;
  text-decoration:none;
  margin:0 10px;
  font-size:12px;
  cursor:pointer;
  padding:6px 10px;
  border-radius:10px;
}

nav a:hover,
nav a.active{
  background:rgba(245,197,66,0.2);
  color:#f5c542;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#f5c542;
}

/* SECTIONS */
section{
  padding:120px 10% 80px;
}

h2{
  color:#f5c542;
  margin-bottom:20px;
}

/* ABOUT */
.about-box{
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(245,197,66,0.2);
  padding:25px;
  border-radius:16px;
}

/* FOLDERS */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:20px;
}

.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.2);
  padding:35px;
  text-align:center;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
}

.folder:hover{
  transform:translateY(-6px);
  background:rgba(245,197,66,0.1);
}

/* GALLERY */
.gallery{
  display:none;
  margin-top:25px;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:14px;
}

.gallery.active{
  display:grid;
}

/* IMAGE BOX */
.card{
  width:100%;
  aspect-ratio: 4 / 3;
  border-radius:14px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

.card:hover img{
  transform:scale(1.08);
}

/* CONTACT */
.contact-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.contact-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:15px;
  border-radius:14px;
  text-decoration:none;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(245,197,66,0.2);
  color:#fff;
}

.contact-btn:hover{
  background:rgba(245,197,66,0.15);
  transform:translateY(-5px);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#aaa;
  font-size:12px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="go('home',this)" class="active">Home</a>
    <a onclick="go('about',this)">About</a>
    <a onclick="go('portfolio',this)">Portfolio</a>
    <a onclick="go('contact',this)">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>Dillu Captures</h1>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <div class="about-box">
    Premium cinematic photography studio.
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">
  <h2>Folders</h2>

  <div class="folders">
    <div class="folder" onclick="toggleFolder('kids')">📸 Kids Shoot</div>
    <div class="folder" onclick="toggleFolder('haldi')">🌼 Haldi Shoot</div>
    <div class="folder" onclick="toggleFolder('outdoor')">🌿 Outdoor Shoot</div>
    <div class="folder" onclick="toggleFolder('cars')">🚗 Cars & Bike</div>
  </div>

  <!-- GALLERIES -->
  <div class="gallery" id="kids">
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
    <div class="card"><img src="Images/NEWBORN/20240805190232_IMG_0703.webp"></div>
  </div>

  <div class="gallery" id="haldi">
    <div class="card"><img src="Images/haldi/1.jpg"></div>
    <div class="card"><img src="Images/haldi/2.jpg"></div>
  </div>

  <div class="gallery" id="outdoor">
    <div class="card"><img src="Images/outdoor/1.jpg"></div>
    <div class="card"><img src="Images/outdoor/2.jpg"></div>
  </div>

  <div class="gallery" id="cars">
    <div class="card"><img src="Images/cars/1.jpg"></div>
    <div class="card"><img src="Images/cars/2.jpg"></div>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <div class="contact-grid">
    <a class="contact-btn" href="tel:+919700034138">📞 Call</a>
    <a class="contact-btn" href="https://wa.me/919700034138">💬 WhatsApp</a>
    <a class="contact-btn" href="mailto:dillucapture@gmail.com">✉ Gmail</a>
    <a class="contact-btn" href="https://instagram.com/">📸 Instagram</a>
  </div>
</section>

<footer>© 2026 Dillu Captures</footer>

<script>

/* NAV */
function go(id,el){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");
}

/* TOGGLE OPEN + CLOSE */
function toggleFolder(id){
  const el = document.getElementById(id);

  // if already open → close
  if(el.classList.contains("active")){
    el.classList.remove("active");
    return;
  }

  // close all
  document.querySelectorAll(".gallery").forEach(g=>g.classList.remove("active"));

  // open clicked
  el.classList.add("active");

  // scroll
  el.scrollIntoView({behavior:"smooth", block:"start"});
}

</script>

</body>
</html>
