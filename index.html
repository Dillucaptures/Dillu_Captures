<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Merriweather:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{
  margin:0;
  font-family:Montserrat;
  background:#000;
  color:#fff;
}

/* NAV */
.navbar{
  position:fixed;top:0;width:100%;
  display:flex;justify-content:center;
}
.navbar-inner{
  width:90%;max-width:1200px;
  margin-top:10px;
  background:rgba(0,0,0,0.7);
  padding:12px 20px;
  border-radius:999px;
  display:flex;justify-content:space-between;
}
.logo{font-family:Dancing Script;font-size:1.6rem}
.logo span{color:#eab308}

/* MAIN */
main{max-width:1200px;margin:auto;padding-top:100px}
section{
  margin:50px 10px;
  padding:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
}

/* OWNER LOGIN */
.owner-btn{
  cursor:pointer;
  color:#eab308;
}

/* UPLOAD */
.upload-section{
  display:none;
  text-align:center;
  padding:20px;
  border:2px dashed #555;
  border-radius:20px;
}
.upload-btn{
  background:#eab308;
  padding:10px 20px;
  border-radius:999px;
  cursor:pointer;
}
#file-input{display:none}

/* GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.gallery-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
}
.gallery-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* DELETE BUTTON */
.delete-btn{
  position:absolute;
  top:10px;right:10px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 8px;
  border-radius:50%;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-inner">
  <div class="logo"><span>Dillu</span> Captures</div>
  <div>
    <span class="owner-btn" onclick="login()">Owner</span>
  </div>
</div>
</nav>

<main>

<section>
<h2>Gallery</h2>

<!-- UPLOAD -->
<div class="upload-section" id="uploadBox">
  <label class="upload-btn" for="file-input">Upload Photos</label>
  <input type="file" id="file-input" multiple accept="image/*">
</div>

<!-- GRID -->
<div class="gallery-grid" id="grid">

<div class="gallery-card">
  <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
  <button class="delete-btn">×</button>
</div>

</div>

</section>

</main>

<script>

// ===== PASSWORD =====
const PASSWORD = "admin123";
let isOwner = false;

// LOGIN
function login(){
  const pass = prompt("Enter owner password:");
  if(pass === PASSWORD){
    isOwner = true;
    alert("Owner mode activated");

    document.getElementById("uploadBox").style.display="block";

    document.querySelectorAll('.delete-btn').forEach(btn=>{
      btn.style.display="block";
    });
  }else{
    alert("Wrong password");
  }
}

// UPLOAD
const input = document.getElementById('file-input');
const grid = document.getElementById('grid');

input.addEventListener('change', e=>{
  const files = e.target.files;

  for(let file of files){
    if(!file.type.startsWith('image')) continue;

    const reader = new FileReader();

    reader.onload = function(e){
      const card = document.createElement('div');
      card.className='gallery-card';

      card.innerHTML = `
        <img src="${e.target.result}">
        <button class="delete-btn">×</button>
      `;

      grid.prepend(card);

      if(isOwner){
        card.querySelector('.delete-btn').style.display="block";
      }

      addDelete(card);
      addTilt(card);
    }

    reader.readAsDataURL(file);
  }
});

// DELETE
function addDelete(card){
  const btn = card.querySelector('.delete-btn');
  btn.addEventListener('click', ()=>{
    card.remove();
  });
}

// apply delete to existing
document.querySelectorAll('.gallery-card').forEach(addDelete);

// TILT EFFECT
function addTilt(card){
  card.addEventListener('mousemove',e=>{
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rx = ((y/rect.height)-0.5)*-10;
    const ry = ((x/rect.width)-0.5)*10;

    card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  });

  card.addEventListener('mouseleave',()=>{
    card.style.transform='none';
  });
}

document.querySelectorAll('.gallery-card').forEach(addTilt);

</script>

</body>
</html>
