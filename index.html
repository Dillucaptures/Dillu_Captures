<!-- PREMIUM UI + ADMIN PASSWORD (UPLOAD + DELETE INSIDE FOLDERS) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dillu Captures</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
h1,h2{text-align:center}
.folder{margin:40px}
.gallery{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.card{position:relative}
.card img{width:220px;height:150px;object-fit:cover;border-radius:12px}

.upload-btn{
  background:#eab308;color:#000;padding:10px 16px;
  border:none;border-radius:20px;margin:10px;cursor:pointer
}
.delete-btn{
  position:absolute;top:5px;right:5px;
  background:red;color:#fff;border:none;border-radius:50%;
  width:28px;height:28px;cursor:pointer
}
</style>
</head>

<body>

<h1>Dillu Captures</h1>

<!-- FOLDERS WITH UPLOAD -->

<div class="folder">
  <h2>Newborn</h2>
  <button class="upload-btn" onclick="uploadImage('newborn')">Upload Photo</button>
  <div class="gallery" id="newborn"></div>
</div>

<div class="folder">
  <h2>Kids</h2>
  <button class="upload-btn" onclick="uploadImage('kids')">Upload Photo</button>
  <div class="gallery" id="kids"></div>
</div>

<div class="folder">
  <h2>Haldi</h2>
  <button class="upload-btn" onclick="uploadImage('haldi')">Upload Photo</button>
  <div class="gallery" id="haldi"></div>
</div>

<div class="folder">
  <h2>Temple</h2>
  <button class="upload-btn" onclick="uploadImage('temple')">Upload Photo</button>
  <div class="gallery" id="temple"></div>
</div>

<div class="folder">
  <h2>Portrait</h2>
  <button class="upload-btn" onclick="uploadImage('portrait')">Upload Photo</button>
  <div class="gallery" id="portrait"></div>
</div>

<script>

// 🔐 CHANGE PASSWORD HERE
const ADMIN_PASSWORD = "dillu123";

function checkPassword(){
  const pass = prompt("Enter Admin Password");
  return pass === ADMIN_PASSWORD;
}

function uploadImage(folder){
  if(!checkPassword()){
    alert("Wrong Password");
    return;
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
      const src = event.target.result;
      addImage(folder, src);
      saveLocal(folder, src);
    }

    reader.readAsDataURL(file);
  }

  input.click();
}

function addImage(folder, src){
  const container = document.getElementById(folder);

  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  const del = document.createElement('button');
  del.innerText = '×';
  del.className = 'delete-btn';

  del.onclick = () => {
    if(!checkPassword()){
      alert("Wrong Password");
      return;
    }
    card.remove();
    removeLocal(folder, src);
  }

  card.appendChild(img);
  card.appendChild(del);
  container.appendChild(card);
}

function saveLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data.push(src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function removeLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data = data.filter(i => i !== src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function loadImages(){
  ['newborn','kids','haldi','temple','portrait'].forEach(folder=>{
    let data = JSON.parse(localStorage.getItem(folder)) || [];
    data.forEach(src=>addImage(folder, src));
  });
}

loadImages();

</script>

</body>
</html>
