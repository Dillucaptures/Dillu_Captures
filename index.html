<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* ================= LOADER ================= */
.loader{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#0a0a0a,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:99999;
}

.loader.hide{
  opacity:0;
  pointer-events:none;
  transition:1s ease;
}

/* BRAND LOADING TEXT */
.brand-wrap{
  position:relative;
  font-family:"Dancing Script";
  font-size:40px;
}

.brand-bg{ color:#222; }

.brand-fill{
  position:absolute;
  top:0;
  left:0;
  width:0%;
  overflow:hidden;
  white-space:nowrap;
  color:gold;
}

/* loading bar */
.load-bar{
  width:260px;
  height:6px;
  background:#111;
  border-radius:50px;
  margin-top:25px;
  overflow:hidden;
}

.load-bar span{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff66,#00cc55);
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(22px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#bbb;
  text-decoration:none;
  margin:0 10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:10px;
}

nav a:hover,
nav a.active{
  background:rgba(245,197,66,0.2);
  color:#f5c542;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#f5c542;
}

/* SECTION */
section{
  padding:100px 10%;
}

/* FOLDERS */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.2);
  padding:40px;
  text-align:center;
  border-radius:16px;
  cursor:pointer;
  transition:0.4s;
}

.folder:hover{
  transform:translateY(-8px);
  background:rgba(245,197,66,0.1);
}

/* GALLERY */
.gallery{
  display:none;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
  margin-top:20px;
  margin-bottom:40px;
}

.gallery.active{
  display:grid;
}

.card{
  border-radius:18px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:270px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img{
  transform:scale(1.12);
}

/* CONTACT BAR */
.contact-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  background:rgba(255,255,255,0.06);
  border-radius:50px;
  padding:12px;
  backdrop-filter:blur(20px);
}

.contact-bar a{
  color:#ddd;
  text-decoration:none;
  font-size:12px;
  padding:10px 14px;
  border-radius:30px;
}

.contact-bar a:hover{
  background:#f5c542;
  color:#000;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="brand-wrap">
    <div class="brand-bg">Dillu Captures</div>
    <div class="brand-fill" id="fillText">Dillu Captures</div>
  </div>

  <div class="load-bar">
    <span id="bar"></span>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a class="active">Home</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Dillu Captures</h1>
</div>

<!-- PORTFOLIO -->
<section id="portfolio">

  <h2>Folders</h2>

  <div class="folders">

    <div class="folder" onclick="openFolder('kids',this)">📸 Kids Shoot</div>
    <div class="folder" onclick="openFolder('haldi',this)">🌼 Haldi Shoot</div>
    <div class="folder" onclick="openFolder('outdoor',this)">🌿 Outdoor Shoot</div>
    <div class="folder" onclick="openFolder('wedding',this)">💍 Wedding Shoot</div>

  </div>

  <!-- KIDS -->
  <div class="gallery" id="kids">
    <div class="card"><img src="Images/kids/1.jpg"></div>
    <div class="card"><img src="Images/kids/2.jpg"></div>
  </div>

  <!-- HALDI -->
  <div class="gallery" id="haldi">
    <div class="card"><img src="Images/haldi/1.jpg"></div>
    <div class="card"><img src="Images/haldi/2.jpg"></div>
  </div>

  <!-- OUTDOOR -->
  <div class="gallery" id="outdoor">
    <div class="card"><img src="Images/outdoor/1.jpg"></div>
    <div class="card"><img src="Images/outdoor/2.jpg"></div>
  </div>

  <!-- WEDDING -->
  <div class="gallery" id="wedding">
    <div class="card"><img src="Images/wedding/1.jpg"></div>
    <div class="card"><img src="Images/wedding/2.jpg"></div>
  </div>

</section>

<!-- CONTACT -->
<div class="contact-bar">
  <a href="tel:+919700034138">📞 Call</a>
  <a href="https://wa.me/919700034138">💬 WhatsApp</a>
  <a href="https://instagram.com/">📸 Instagram</a>
</div>

<script>

/* LOADER */
let i=0;
let bar=document.getElementById("bar");
let fill=document.getElementById("fillText");

let load=setInterval(()=>{
  i++;
  bar.style.width=i+"%";
  fill.style.width=i+"%";

  if(i>=100){
    clearInterval(load);
    document.getElementById("loader").classList.add("hide");
  }
},20);

/* OPEN FOLDER BELOW CLICK */
function openFolder(id,el){

  document.querySelectorAll(".gallery").forEach(g=>{
    g.classList.remove("active");
  });

  let target=document.getElementById(id);
  target.classList.add("active");

  // move gallery directly under clicked folder
  el.insertAdjacentElement("afterend",target);

  // scroll smoothly
  target.scrollIntoView({behavior:"smooth",block:"start"});
}

</script>

</body>
</html>
