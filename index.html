<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* ================= LOADER ================= */
.loader{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#0b0b0b,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  transition:1s ease;
}

.loader.hidden{
  opacity:0;
  pointer-events:none;
}

.loader-box{
  text-align:center;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* CAMERA */
.camera{
  width:150px;
  height:110px;
  margin:auto;
  position:relative;
  animation:float 2.5s ease-in-out infinite;
}

.camera-body{
  width:150px;
  height:90px;
  background:linear-gradient(145deg,#1c1c1c,#0a0a0a);
  border:1px solid rgba(245,197,66,0.25);
  border-radius:16px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.8);
}

.lens{
  width:45px;
  height:45px;
  border-radius:50%;
  background:radial-gradient(circle,#111,#000);
  border:3px solid #f5c542;
  position:absolute;
  top:22px;
  left:52px;
  box-shadow:0 0 25px rgba(245,197,66,0.6);
  animation:pulse 1.8s infinite;
}

.flash{
  width:40px;
  height:10px;
  background:#222;
  position:absolute;
  top:-10px;
  left:55px;
  border-radius:4px;
  border:1px solid rgba(245,197,66,0.2);
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

@keyframes pulse{
  0%{transform:scale(0.95); opacity:0.6;}
  50%{transform:scale(1.1); opacity:1;}
  100%{transform:scale(0.95); opacity:0.6;}
}

.loader-title{
  font-family:Dancing Script;
  font-size:32px;
  color:#f5c542;
  margin-top:12px;
}

/* LOADING BAR */
.loading-bar{
  width:280px;
  height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:50px;
  margin:22px auto 10px;
  overflow:hidden;
}

.loading-bar::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(90deg,transparent,#f5c542,transparent);
  opacity:0.25;
  filter:blur(8px);
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#f5c542,#ffdd77);
  border-radius:50px;
  transition:0.25s ease;
}

#loading-text{
  font-size:12px;
  color:#aaa;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=2000&q=80")
  center/cover no-repeat;
  opacity:0.10;
  filter:blur(2px);
  z-index:-3;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(245,197,66,0.20), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(245,197,66,0.10), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(255,200,120,0.10), transparent 55%);
  filter:blur(80px);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.15);
  backdrop-filter:blur(22px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav .links a{
  color:#bbb;
  text-decoration:none;
  margin:0 10px;
  font-size:12px;
  cursor:pointer;
  padding:6px 10px;
  border-radius:10px;
  transition:0.3s;
}

nav .links a:hover,
nav .links a.active{
  background:rgba(245,197,66,0.2);
  color:#f5c542;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#f5c542;
}

/* SECTIONS */
section{
  padding:100px 10%;
  opacity:0;
  transform:translateY(60px);
  transition:1s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
}

.card{
  border-radius:18px;
  overflow:hidden;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  height:270px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img{
  transform:scale(1.12);
}

/* CONTACT BAR */
.contact-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  background:rgba(255,255,255,0.06);
  border-radius:50px;
  padding:12px;
  backdrop-filter:blur(20px);
}

.contact-bar a{
  color:#ddd;
  text-decoration:none;
  font-size:12px;
  padding:10px 14px;
  border-radius:30px;
}

.contact-bar a:hover{
  background:#f5c542;
  color:#000;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#666;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-box">

    <div class="camera">
      <div class="camera-body"></div>
      <div class="lens"></div>
      <div class="flash"></div>
    </div>

    <div class="loader-title">Dillu Captures</div>

    <div class="loading-bar">
      <div class="progress" id="progress"></div>
    </div>

    <p id="loading-text">Loading 0%</p>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="logo">Dillu Captures</div>

  <div class="links">
    <a onclick="goTo('home',this)" class="active">Home</a>
    <a onclick="goTo('about',this)">About</a>
    <a onclick="goTo('portfolio',this)">Portfolio</a>
    <a onclick="goTo('contact',this)">Contact</a>
  </div>
</nav>

<div class="hero" id="home">
  <h1>Dillu Captures</h1>
  <p>Luxury cinematic photography capturing emotion</p>
</div>

<section id="about">
  <h2>About</h2>
</section>

<section id="portfolio">
  <div class="gallery">
    <div class="card"><img src="Images/kids/1.jpg"></div>
    <div class="card"><img src="Images/haldi/1.jpg"></div>
    <div class="card"><img src="Images/outdoor/1.jpg"></div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
</section>

<div class="contact-bar">
  <a href="tel:+919700034138">📞 Call</a>
  <a href="https://wa.me/919700034138">💬 WhatsApp</a>
  <a href="https://instagram.com/">📸 Instagram</a>
  <a href="mailto:dillucapture@gmail.com">✉ Mail</a>
</div>

<footer>© 2026 Dillu Captures</footer>

<script>

/* LOADER */
let progress = 0;
let bar = document.getElementById("progress");
let text = document.getElementById("loading-text");

let load = setInterval(()=>{
  progress++;
  bar.style.width = progress + "%";
  text.innerText = "Loading " + progress + "%";

  if(progress >= 100){
    clearInterval(load);
    document.getElementById("loader").classList.add("hidden");
  }
},18);

/* NAV */
function goTo(id, el){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");
}

/* SCROLL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:0.15});

document.querySelectorAll("section,.card").forEach(el=>{
  observer.observe(el);
});

</script>

</body>
</html>
