<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body { background:#000; color:white; font-family:sans-serif; }
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.gallery-card { position:relative; }
.gallery-card img { width:100%; border-radius:10px; }
.gallery-meta { position:absolute; bottom:10px; left:10px; right:10px; display:flex; justify-content:space-between; }
.folder { display:none; }
.folder.active { display:block; }
.tab-btn { margin:5px; padding:10px; cursor:pointer; }
.tab-btn.active { background:gold; color:black; }
.cta-btn, .cta-secondary { padding:8px 12px; cursor:pointer; margin:5px; }
</style>
</head>

<body>

<h2>Gallery</h2>

<div class="gallery-tabs">
<button class="tab-btn active" data-folder="all">All</button>
<button class="tab-btn" data-folder="kids">Kids</button>
</div>

<div id="gallery">

<div class="folders-grid">

<!-- ALL -->
<div class="folder active" data-folder="all">
<div class="folder-header">
<h3>All</h3>
<span class="folder-count"></span>
</div>
<div class="gallery-grid">
<a class="gallery-card">
<img src="https://via.placeholder.com/300">
<div class="gallery-meta"><span>Sample</span></div>
</a>
</div>
</div>

<!-- KIDS -->
<div class="folder" data-folder="kids">
<div class="folder-header">
<h3>Kids</h3>
<span class="folder-count"></span>
</div>
<div class="gallery-grid"></div>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const ADMIN_PASSWORD = "1234";

function askPassword() {
  return prompt("Enter Admin Password") === ADMIN_PASSWORD;
}

// ------------------ TABS ------------------
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.folder').forEach(f => {
        f.classList.toggle('active', f.dataset.folder === btn.dataset.folder);
      });
    };
  });
}
setupTabs();

// ------------------ DELETE ------------------
function addDelete(card) {
  const meta = card.querySelector(".gallery-meta");

  const btn = document.createElement("button");
  btn.textContent = "Delete";
  btn.style.cssText = "background:red;color:white;border:none;padding:4px;border-radius:5px;";

  btn.onclick = (e) => {
    e.preventDefault();
    if (!askPassword()) return alert("Wrong password");
    card.remove();
    updateCounts();
  };

  meta.appendChild(btn);
}

document.querySelectorAll(".gallery-card").forEach(addDelete);

// ------------------ UPLOAD ------------------
function setupUpload() {
  document.querySelectorAll('.folder-header').forEach(header => {

    const btn = document.createElement("button");
    btn.textContent = "Upload";
    btn.className = "cta-secondary";

    btn.onclick = () => {
      if (!askPassword()) return alert("Wrong password");

      const input = document.createElement("input");
      input.type = "file";
      input.multiple = true;
      input.accept = "image/*";

      input.onchange = e => {
        const grid = header.parentElement.querySelector(".gallery-grid");

        [...e.target.files].forEach(file => {
          const reader = new FileReader();

          reader.onload = ev => {
            const card = document.createElement("a");
            card.className = "gallery-card";

            card.innerHTML = `
              <img src="${ev.target.result}">
              <div class="gallery-meta"><span>New</span></div>
            `;

            addDelete(card);
            grid.appendChild(card);
            updateCounts();
          };

          reader.readAsDataURL(file);
        });
      };

      input.click();
    };

    header.appendChild(btn);
  });
}
setupUpload();

// ------------------ ADD FOLDER ------------------
function setupAddFolder() {
  const btn = document.createElement("button");
  btn.textContent = "Add Folder";
  btn.className = "cta-btn";

  document.body.prepend(btn);

  btn.onclick = () => {
    if (!askPassword()) return alert("Wrong password");

    const name = prompt("Folder name");
    if (!name) return;

    const id = name.toLowerCase().replace(/\s+/g,'-');

    // tab
    const tab = document.createElement("button");
    tab.className = "tab-btn";
    tab.dataset.folder = id;
    tab.textContent = name;
    document.querySelector(".gallery-tabs").appendChild(tab);

    // folder
    const folder = document.createElement("div");
    folder.className = "folder";
    folder.dataset.folder = id;

    folder.innerHTML = `
      <div class="folder-header">
        <h3>${name}</h3>
        <span class="folder-count"></span>
      </div>
      <div class="gallery-grid"></div>
    `;

    document.querySelector(".folders-grid").appendChild(folder);

    setupTabs();
    setupUpload();
  };
}
setupAddFolder();

// ------------------ COUNT ------------------
function updateCounts() {
  document.querySelectorAll('.folder').forEach(folder => {
    const count = folder.querySelectorAll('.gallery-card').length;
    folder.querySelector('.folder-count').textContent =
      `${count} photo${count !== 1 ? 's' : ''}`;
  });
}
updateCounts();

});
</script>

</body>
</html>
