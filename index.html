<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Capture | Cinematic Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* Smooth scroll feel */
html{scroll-behavior:smooth}

/* Glass */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
}

header{
  position:fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

header h1{font-family:'Playfair Display';letter-spacing:2px}

nav a{
  margin:0 15px;
  color:#aaa;
  text-decoration:none;
}
nav a:hover{color:#fff}

/* Hero */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-box{
  width:90%;
  max-width:1200px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:60px;
}

.hero-text h2{
  font-size:60px;
  font-family:'Playfair Display';
}

.hero-text p{color:#aaa;margin-top:20px}

.hero-image img{
  width:400px;
  height:520px;
  object-fit:cover;
  border-radius:20px;
}

/* Fullscreen sections */
.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.image-section{
  background-size:cover;
  background-position:center;
}

.overlay{
  background:rgba(0,0,0,0.5);
  padding:40px;
}

.overlay h2{
  font-size:40px;
  font-family:'Playfair Display';
}

/* Portfolio grid */
.gallery{
  padding:100px 40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  height:400px;
  object-fit:cover;
  transition:.5s;
}

.gallery img:hover{transform:scale(1.05)}

/* Booking */
.contact{
  padding:120px 40px;
  text-align:center;
}

.booking a{
  display:inline-block;
  margin:10px;
  padding:15px 30px;
  border-radius:30px;
  text-decoration:none;
}

.instagram{
  background:linear-gradient(45deg,#fd1d1d,#833ab4,#fcb045);
  color:#fff;
}

.whatsapp{
  background:#fff;
  color:#000;
}

footer{text-align:center;padding:30px;color:#666}

</style>
</head>

<body>

<header class="glass">
  <h1>DILLU</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#work">Work</a>
    <a href="#contact">Book</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="glass hero-box">
    <div class="hero-text">
      <h2>Cinematic Frames</h2>
      <p>Luxury Photography Experience</p>
    </div>
    <div class="hero-image">
      <img src="images/profile.jpg">
    </div>
  </div>
</section>

<!-- FULLSCREEN SCROLL SECTIONS -->
<section class="section image-section" style="background-image:url('images/img1.jpg')">
  <div class="overlay glass">
    <h2>Emotion</h2>
  </div>
</section>

<section class="section image-section" style="background-image:url('images/img2.jpg')">
  <div class="overlay glass">
    <h2>Luxury</h2>
  </div>
</section>

<section class="section image-section" style="background-image:url('images/img3.jpg')">
  <div class="overlay glass">
    <h2>Timeless</h2>
  </div>
</section>

<!-- GRID -->
<section id="work" class="gallery">
  <img src="images/img4.jpg">
  <img src="images/img5.jpg">
  <img src="images/img6.jpg">
</section>

<!-- BOOK -->
<section class="contact" id="contact">
  <h2>Book Your Shoot</h2>
  <div class="booking">
    <a class="instagram" href="https://instagram.com/yourusername" target="_blank">Instagram</a>
    <a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">WhatsApp</a>
  </div>
</section>

<footer>
  <p>© 2026 Dillu Capture</p>
</footer>

</body>
</html>
