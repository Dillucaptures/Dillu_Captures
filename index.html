<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:Montserrat; background:#000; color:#fff; }
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; }
.gallery-card img { width:100%; border-radius:12px; }
.tab-btn { margin:5px; padding:10px; cursor:pointer; background:#222; border:none; color:#fff; }
.tab-btn.active { background:#eab308; color:#000; }
.folder { display:none; }
.folder.active { display:block; }
</style>
</head>

<body>

<h1 style="text-align:center;">Dillu Captures</h1>

<div style="text-align:center;">
<button class="tab-btn active" data-folder="all">All</button>
<button class="tab-btn" data-folder="newborn">Newborn</button>
<button class="tab-btn" data-folder="kids">Kids</button>
<button class="tab-btn" data-folder="haldi">Haldi</button>
<button class="tab-btn" data-folder="temple">Temple</button>
<button class="tab-btn" data-folder="portrait">Portrait</button>
</div>

<div class="folders-grid"></div>

<script>
const container = document.querySelector('.folders-grid');

async function loadImages() {
  const res = await fetch('/api/images');
  const images = await res.json();

  const categories = ['all','newborn','kids','haldi','temple','portrait'];

  container.innerHTML = '';

  categories.forEach(cat => {
    const folder = document.createElement('div');
    folder.className = 'folder ' + (cat==='all' ? 'active':'');
    folder.dataset.folder = cat;

    const filtered = cat==='all'
      ? images
      : images.filter(img => img.category === cat);

    folder.innerHTML = `
      <h2>${cat.toUpperCase()} (${filtered.length})</h2>
      <div class="gallery-grid">
        ${filtered.map(img => `
          <div class="gallery-card">
            <img src="${img.src}" loading="lazy">
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(folder);
  });

  initTabs();
}

function initTabs() {
  const tabs = document.querySelectorAll('.tab-btn');
  const folders = document.querySelectorAll('.folder');

  tabs.forEach(tab => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      folders.forEach(f => {
        f.classList.toggle(
          'active',
          f.dataset.folder === tab.dataset.folder
        );
      });
    };
  });
}

window.onload = loadImages;
</script>

</body>
</html>
