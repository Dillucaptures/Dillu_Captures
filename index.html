<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:Montserrat;
  color:#fff;
  background: radial-gradient(circle at 20% 20%, #0f172a, #000);
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:25px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  z-index:1000;
}
nav .glass{
  margin:10px;
  padding:10px 25px;
  display:flex;
  gap:25px;
  border-radius:50px;
}

/* LINKS */
a{color:#aaa;text-decoration:none}
a:hover{color:#fff}

/* SECTION */
section{
  max-width:1100px;
  margin:120px auto;
  padding:30px;
}

/* HERO */
#home{text-align:center}
#home h1{
  font-size:48px;
  background:linear-gradient(90deg,gold,orange);
  -webkit-background-clip:text;
  color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

/* CARD */
.card img{
  width:100%;
  border-radius:15px;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:4px;
  font-size:12px;
}

.upload{background:gold;color:black}
.delete{background:red;color:white}
.download{background:#2563eb;color:white}
.addFolder{background:green;color:white}

/* DROP */
.drop{
  padding:20px;
  border:1px dashed rgba(255,255,255,0.3);
  border-radius:15px;
  text-align:center;
  margin-bottom:10px;
}

/* PROGRESS */
.progressBox{display:none;margin:10px 0}
.progressBar{
  height:8px;
  width:0%;
  background:gold;
  border-radius:10px;
}

/* CONTACT */
.contact-icons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.contact-icons a{
  padding:8px 12px;
  border-radius:20px;
  background:#111;
}

</style>
</head>

<body>

<nav>
  <div class="glass">
    <a href="#home">Home</a>
    <a href="#gallery">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section id="home" class="glass">
  <h1>Dillu Captures</h1>
  <p>Premium photography experience ✨</p>
</section>

<section id="gallery" class="glass">
  <h2>Gallery</h2>
  <button class="btn addFolder" onclick="addFolder()">+ Folder</button>
  <div id="folders"></div>
</section>

<section id="about" class="glass">
  <h2>About</h2>
  <p>Professional photography capturing real emotions.</p>
</section>

<section id="contact" class="glass">
  <h2>Contact</h2>
  <p>Email: Dillucapture@gmail.com</p>
  <p>Phone: +91 9700034138</p>

  <div class="contact-icons">
    <a href="mailto:Dillucapture@gmail.com">Email</a>
    <a href="tel:9700034138">Call</a>
    <a href="https://wa.me/919700034138">WhatsApp</a>
    <a href="#">Instagram</a>
  </div>
</section>

<script>

const ADMIN_PASSWORD="1234";

/* DATA */
let data = JSON.parse(localStorage.getItem("galleryData")) || {
  folders:{ "All":[] }
};

/* SAVE */
function save(){
  localStorage.setItem("galleryData",JSON.stringify(data));
}

/* ADMIN CHECK */
function checkAdmin(){
  return prompt("Admin Password")===ADMIN_PASSWORD;
}

/* RENDER ALL FOLDERS */
function render(){
  const container=document.getElementById("folders");
  container.innerHTML="";

  Object.keys(data.folders).forEach(name=>{
    let box=document.createElement("div");
    box.className="glass";
    box.style.marginBottom="20px";
    box.style.padding="15px";

    box.innerHTML=`
      <h3>${name}</h3>
      <button class="btn upload" onclick="uploadImage('${name}')">Upload</button>
      <button class="btn delete" onclick="deleteFolder('${name}')">Delete Folder</button>

      <div class="drop" id="drop-${name}">
        Drag & Drop Images
      </div>

      <div class="progressBox" id="progress-${name}">
        <div style="background:#111;border-radius:10px;">
          <div class="progressBar" id="bar-${name}"></div>
        </div>
      </div>

      <div class="grid" id="grid-${name}"></div>
    `;

    container.appendChild(box);

    let grid=document.getElementById("grid-"+name);

    data.folders[name].forEach((img,i)=>{
      let card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <img src="${img}">
        <div>
          <button class="btn download" onclick="downloadImage('${img}',${i})">Download</button>
          <button class="btn delete" onclick="deleteImage('${name}',${i})">Delete</button>
        </div>
      `;
      grid.appendChild(card);
    });

    setupDragDrop(name);
  });
}

/* DOWNLOAD */
function downloadImage(img,i){
  let a=document.createElement("a");
  a.href=img;
  a.download="photo_"+i+".jpg";
  a.click();
}

/* DRAG DROP */
function setupDragDrop(folder){
  let drop=document.getElementById("drop-"+folder);

  drop.ondragover=e=>{e.preventDefault();}
  drop.ondrop=e=>{
    e.preventDefault();
    if(!checkAdmin()) return alert("Wrong password");
    handleFiles(e.dataTransfer.files,folder);
  };
}

/* UPLOAD BUTTON */
function uploadImage(folder){
  if(!checkAdmin()) return alert("Wrong password");

  let input=document.createElement("input");
  input.type="file";
  input.multiple=true;

  input.onchange=e=>handleFiles(e.target.files,folder);
  input.click();
}

/* HANDLE FILES */
function handleFiles(files,folder){
  let bar=document.getElementById("bar-"+folder);
  let box=document.getElementById("progress-"+folder);

  box.style.display="block";

  let total=files.length;
  let count=0;

  Array.from(files).forEach(file=>{
    let reader=new FileReader();

    reader.onload=()=>{
      data.folders[folder].push(reader.result);
      count++;
      bar.style.width=(count/total*100)+"%";

      if(count===total){
        save();
        render();
      }
    };

    reader.readAsDataURL(file);
  });
}

/* DELETE IMAGE */
function deleteImage(folder,i){
  if(!checkAdmin()) return alert("Wrong password");
  data.folders[folder].splice(i,1);
  save();
  render();
}

/* ADD FOLDER */
function addFolder(){
  if(!checkAdmin()) return alert("Wrong password");

  let name=prompt("Folder name?");
  if(!name) return;

  if(data.folders[name]) return alert("Exists");

  data.folders[name]=[];
  save();
  render();
}

/* DELETE FOLDER */
function deleteFolder(name){
  if(!checkAdmin()) return alert("Wrong password");

  if(!confirm("Delete folder?")) return;

  delete data.folders[name];
  save();
  render();
}

/* INIT */
render();

</script>

</body>
</html>
