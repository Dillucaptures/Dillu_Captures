<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s ease;
}

/* ================= INTRO ================= */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.intro-text {
  font-family: 'Playfair Display';
  font-size: 42px;
  opacity: 0;
  transform: translateY(30px);
  animation: introText 1.5s ease forwards;
}

@keyframes introText {
  to { opacity: 1; transform: translateY(0); }
}

.intro.hide {
  animation: fadeOut 1.2s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* ================= NAV ================= */
header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 60px;
  backdrop-filter: blur(20px);
  background: var(--glass);
  z-index: 1000;
}

header h1 {
  font-family: 'Playfair Display';
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  position: relative;
}

nav a::after {
  content: "";
  width: 0;
  height: 1px;
  background: var(--text);
  position: absolute;
  left: 0;
  bottom: -4px;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

/* THEME BUTTON */
.toggle {
  margin-left: 25px;
  cursor: pointer;
  font-size: 18px;
}

/* ================= HERO ================= */
.hero {
  display: flex;
  align-items: center;
  min-height: 100vh;
  padding: 120px 60px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  right: 0;
  width: 50%;
  height: 100%;
  background: url('Images/1776695215852.webp') center/cover no-repeat;
}

/* TEXT */
.hero-text {
  max-width: 500px;
  animation: fadeUp 1.2s ease;
}

.hero-text h2 {
  font-family: 'Playfair Display';
  font-size: 48px;
  margin-bottom: 15px;
}

.hero-text p {
  opacity: 0.7;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* ================= SECTIONS ================= */
section {
  padding: 120px 60px;
}

.about {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
}

.about img {
  width: 100%;
  border-radius: 20px;
  transition: 0.4s;
}

.about img:hover {
  transform: scale(1.03);
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 25px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 12px 28px;
  border-radius: 30px;
  background: var(--glass);
  text-decoration: none;
  color: var(--text);
  transition: 0.3s;
}

.btn:hover {
  background: #111;
  color: #fff;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

  header {
    padding: 15px 20px;
  }

  nav a {
    margin-left: 15px;
    font-size: 13px;
  }

  .hero {
    flex-direction: column;
    text-align: center;
    padding: 100px 20px;
  }

  .hero::after {
    width: 100%;
    height: 50%;
    top: 0;
  }

  .hero-text {
    margin-top: 55vh;
  }

  .hero-text h2 {
    font-size: 32px;
  }

  .about {
    grid-template-columns: 1fr;
  }

  section {
    padding: 100px 20px;
  }
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-text">Dillu Captures</div>
</div>

<!-- NAV -->
<header>
  <h1>Dillu_Captures</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
    <span class="toggle" onclick="toggleTheme()">☾</span>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion, elegance, and storytelling.</p>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="about">
  <img src="Images/IMG_1164.webp">
  <div>
    <h2>About Me</h2>
    <p>I am a professional photographer specializing in portraits, weddings, and cinematic storytelling.</p>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>
  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <br>
  <a class="btn" href="https://wa.me/919700034138">WhatsApp</a>
</section>

<script>

/* INTRO */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");
  }, 1800);
});

/* THEME TOGGLE (FIXED FOR MOBILE) */
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}

/* LOAD SAVED THEME */
if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark");
}

</script>

</body>
</html>
