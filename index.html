<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* ================= NAV (FIXED + BLUR APPLE STYLE) ================= */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(18px);
  border:1px solid rgba(245,197,66,0.2);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#bbb;
  text-decoration:none;
  margin:0 10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:10px;
  transition:0.3s;
}

nav a:hover,
nav a.active{
  background:rgba(245,197,66,0.2);
  color:#f5c542;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#f5c542;
}

/* SECTION */
section{
  padding:120px 10% 80px;
}

/* FOLDERS */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.2);
  padding:40px;
  text-align:center;
  border-radius:16px;
  cursor:pointer;
  transition:0.4s;
}

.folder:hover{
  transform:translateY(-8px);
  background:rgba(245,197,66,0.1);
}

/* IMPORTANT FIX: gallery ALWAYS BELOW */
.gallery{
  display:none;
  width:100%;
  margin-top:20px;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
}

.gallery.active{
  display:grid;
}

.card{
  border-radius:18px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:270px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img{
  transform:scale(1.12);
}

/* CONTACT BAR */
.contact-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  background:rgba(255,255,255,0.06);
  border-radius:50px;
  padding:12px;
  backdrop-filter:blur(20px);
}

.contact-bar a{
  color:#ddd;
  text-decoration:none;
  font-size:12px;
  padding:10px 14px;
  border-radius:30px;
}

.contact-bar a:hover{
  background:#f5c542;
  color:#000;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a class="active">Home</a>
    <a>About</a>
    <a>Portfolio</a>
    <a>Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Dillu Captures</h1>
</div>

<!-- PORTFOLIO -->
<section>

  <h2>Folders</h2>

  <div class="folders">

    <div class="folder" onclick="openFolder('kids')">📸 Kids Shoot</div>
    <div class="folder" onclick="openFolder('haldi')">🌼 Haldi Shoot</div>
    <div class="folder" onclick="openFolder('outdoor')">🌿 Outdoor Shoot</div>
    <div class="folder" onclick="openFolder('wedding')">💍 Wedding Shoot</div>

  </div>

  <!-- GALLERIES (stay BELOW properly) -->
  <div class="gallery" id="kids">
    <div class="card"><img src="Images/kids/1.jpg"></div>
    <div class="card"><img src="Images/kids/2.jpg"></div>
  </div>

  <div class="gallery" id="haldi">
    <div class="card"><img src="Images/haldi/1.jpg"></div>
    <div class="card"><img src="Images/haldi/2.jpg"></div>
  </div>

  <div class="gallery" id="outdoor">
    <div class="card"><img src="Images/outdoor/1.jpg"></div>
    <div class="card"><img src="Images/outdoor/2.jpg"></div>
  </div>

  <div class="gallery" id="wedding">
    <div class="card"><img src="Images/wedding/1.jpg"></div>
    <div class="card"><img src="Images/wedding/2.jpg"></div>
  </div>

</section>

<!-- CONTACT -->
<div class="contact-bar">
  <a href="tel:+919700034138">📞 Call</a>
  <a href="https://wa.me/919700034138">💬 WhatsApp</a>
  <a href="https://instagram.com/">📸 Instagram</a>
</div>

<script>

/* ONLY ONE OPEN AT A TIME */
function openFolder(id){

  document.querySelectorAll(".gallery").forEach(g=>{
    g.classList.remove("active");
  });

  const el = document.getElementById(id);
  el.classList.add("active");

  // ensures ALWAYS below in layout
  el.scrollIntoView({behavior:"smooth", block:"start"});
}

</script>

</body>
</html>
