<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Montserrat;
  color:#fff;
  background:#000;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:28px;
  color:#f5c542;
}

nav a{
  color:#ddd;
  margin:0 10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:80px;
  color:#f5c542;
}

/* SECTION */
section{
  padding:60px 8% 40px;
}

h2{
  color:#f5c542;
  margin-bottom:10px;
}

/* GRID */
.folder-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* FOLDER */
.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.3);
  padding:30px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:.3s;
  backdrop-filter:blur(10px);
}

.folder::before{
  content:"";
  position:absolute;
  top:-8px;
  left:20px;
  width:45px;
  height:14px;
  background:#f5c542;
  border-radius:6px 6px 0 0;
}

.folder:hover{
  transform:translateY(-6px);
  background:rgba(245,197,66,0.15);
  box-shadow:0 10px 30px rgba(245,197,66,0.2);
}

.folder.active{
  border-color:#f5c542;
  background:rgba(245,197,66,0.2);
}

/* 🔥 GALLERY WRAP */
.gallery-wrap{
  grid-column:1/-1;
  overflow-x:auto;
  padding-bottom:10px;
}

/* 🔥 5 ROW SYSTEM */
.gallery{
  display:grid;
  grid-auto-flow:column;
  grid-template-rows:repeat(5, 180px);
  gap:12px;
  width:max-content;
}

/* CARD */
.card{
  width:260px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="go('home')">Home</a>
    <a onclick="go('about')">About</a>
    <a onclick="go('portfolio')">Portfolio</a>
  </div>
</nav>

<div class="hero" id="home">
  <h1>Dillu Captures</h1>
  <p>"Preserving the beauty of a moment."</p>
</div>

<section id="about">
  <h2>About</h2>
  <p>Premium cinematic photography studio.</p>
</section>

<section id="portfolio">
  <h2>Folders</h2>

  <div class="folder-grid" id="grid">
    <div class="folder" onclick="openFolder(this,'kids')">📸 Kids</div>
    <div class="folder" onclick="openFolder(this,'maternity')">🤰 Maternity</div>
    <div class="folder" onclick="openFolder(this,'cars')">🚗 Cars</div>
    <div class="folder" onclick="openFolder(this,'haldi')">🌼 Haldi</div>
    <div class="folder" onclick="openFolder(this,'temples')">🛕 Temples</div>
    <div class="folder" onclick="openFolder(this,'pets')">🐾 Pets</div>
  </div>

  <!-- DATA -->

  <div id="kids" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1607457561901-e6ec3a6d16cf" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" onclick="openImg(this)"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="maternity" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="cars" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="haldi" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="temples" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914" onclick="openImg(this)"></div>
    </div>
  </div>

  <div id="pets" hidden>
    <div class="gallery">
      <div class="card"><img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d" onclick="openImg(this)"></div>
    </div>
  </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>

function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

let activeBox=null;

function openFolder(el,id){

  let grid=document.getElementById("grid");

  if(activeBox){
    activeBox.remove();
    activeBox=null;
  }

  if(el.classList.contains("active")){
    el.classList.remove("active");
    return;
  }

  document.querySelectorAll(".folder").forEach(f=>f.classList.remove("active"));
  el.classList.add("active");

  let content=document.getElementById(id).innerHTML;

  let wrap=document.createElement("div");
  wrap.className="gallery-wrap";
  wrap.innerHTML=content;

  el.insertAdjacentElement("afterend",wrap);

  activeBox=wrap;
}

function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightImg").src=img.src;
}

</script>

</body>
</html>
