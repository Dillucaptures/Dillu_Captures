<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Montserrat;
  background:#000;
  color:#fff;
}

.nav {
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.logo {
  font-family:'Dancing Script';
  font-size:1.8rem;
  color:#ffd700;
}

.contact-btn {
  background:linear-gradient(45deg,#eab308,#f97316);
  padding:10px 20px;
  border-radius:20px;
  text-decoration:none;
  color:#000;
  font-weight:600;
}

main { padding-top:80px; max-width:1200px; margin:auto; }

.upload-box {
  display:none;
  text-align:center;
  margin:30px 0;
}

.upload-btn {
  background:#ffd700;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  position:relative;
}

.card img {
  width:100%;
  border-radius:15px;
}

.delete {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  border:none;
  color:#fff;
  border-radius:50%;
  width:30px;
  height:30px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">Dillu Captures</div>
  <a href="https://wa.me/919700034138" class="contact-btn">Contact</a>
</div>

<main>

<h2>Gallery</h2>

<div class="upload-box" id="uploadBox">
  <input type="file" id="fileInput" multiple>
</div>

<div class="gallery" id="gallery"></div>

</main>

<script>

// 🔐 SECRET ADMIN KEY
const ADMIN_KEY = "dillu123";

// Detect admin mode
const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get("admin") === ADMIN_KEY;

const uploadBox = document.getElementById("uploadBox");
const gallery = document.getElementById("gallery");

// Show upload if admin
if (isAdmin) {
  uploadBox.style.display = "block";
}

// Load images from localStorage (simple demo)
let images = JSON.parse(localStorage.getItem("gallery") || "[]");

// Render gallery
function render() {
  gallery.innerHTML = "";

  images.forEach((img, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${img}">
      <button class="delete">×</button>
    `;

    const delBtn = card.querySelector(".delete");

    if (isAdmin) {
      delBtn.style.display = "block";
      delBtn.onclick = () => {
        images.splice(index,1);
        localStorage.setItem("gallery", JSON.stringify(images));
        render();
      };
    }

    gallery.appendChild(card);
  });
}

render();

// Upload
document.getElementById("fileInput").addEventListener("change", function(e){
  const files = e.target.files;

  for (let file of files) {
    const reader = new FileReader();

    reader.onload = function(ev){
      images.unshift(ev.target.result);
      localStorage.setItem("gallery", JSON.stringify(images));
      render();
    };

    reader.readAsDataURL(file);
  }
});

</script>

</body>
</html>
