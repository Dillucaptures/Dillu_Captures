<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= INTRO SCREEN ================= */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  overflow: hidden;
}

.intro-text {
  text-align: center;
  font-family: 'Playfair Display';
  font-size: 40px;
  opacity: 0;
  transform: translateY(30px);
  animation: introText 1.5s ease forwards;
}

@keyframes introText {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.intro.hide {
  animation: introHide 1.2s ease forwards;
}

@keyframes introHide {
  to {
    opacity: 0;
    transform: scale(1.05);
    visibility: hidden;
  }
}

/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.5s;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  backdrop-filter: blur(20px);
  background: var(--glass);
  z-index: 1000;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  min-height: 100vh;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  right: 0;
  width: 50%;
  height: 100%;
  background: url('Images/1776695215852.webp') center/cover no-repeat;
}

/* TEXT */
.hero-text {
  max-width: 500px;
  animation: fadeUp 1.2s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* CURSOR */
.cursor {
  position: fixed;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

.cursor.glow {
  width: 60px;
  height: 60px;
  background: rgba(0,0,0,0.1);
}

@media (max-width:768px){
  .cursor{display:none;}
}

/* SECTIONS */
section {
  padding: 120px 60px;
}

.about {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.about img {
  width: 100%;
  border-radius: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
}

.btn {
  padding: 12px 25px;
  background: var(--glass);
  border-radius: 30px;
  text-decoration: none;
  color: var(--text);
}

/* MOBILE */
@media(max-width:768px){
  .hero {flex-direction:column; text-align:center;}
  .hero::after {width:100%; height:50%;}
  .hero-text {margin-top:55vh;}
  .about {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-text">
    Dillu Captures
  </div>
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<header>
  <h1>Dillu_Captures</h1>
</header>

<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<section class="about">
  <img src="Images/IMG_1164.webp">
  <div>
    <h2>About Me</h2>
    <p>Cinematic storytelling through photography.</p>
  </div>
</section>

<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>
</section>

<section>
  <h2>Contact</h2>
  <a class="btn" href="https://wa.me/919700034138">WhatsApp</a>
</section>

<script>

/* INTRO TIMELINE */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");
  }, 2000);
});

/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

document.querySelectorAll("a, img").forEach(el => {
  el.addEventListener("mouseenter", () => cursor.classList.add("glow"));
  el.addEventListener("mouseleave", () => cursor.classList.remove("glow"));
});

</script>

</body>
</html>
