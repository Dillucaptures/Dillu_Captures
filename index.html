<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dillu Captures | Premium Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* ================= LOADER ================= */
.loader{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#0a0a0a,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  flex-direction:column;
}

/* fade out */
.loader.hidden{
  opacity:0;
  pointer-events:none;
  transition:1s ease;
}

/* CAMERA 3D */
.camera-3d{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  animation:rotateCam 3s linear infinite, float 2s ease-in-out infinite;
}

.camera-body{
  width:120px;
  height:80px;
  background:linear-gradient(145deg,#1c1c1c,#000);
  border:1px solid #00ff66;
  border-radius:14px;
  box-shadow:0 0 40px rgba(0,255,102,0.3);
  position:absolute;
  top:20px;
}

.lens{
  width:40px;
  height:40px;
  border-radius:50%;
  background:radial-gradient(circle,#111,#000);
  border:3px solid #00ff66;
  position:absolute;
  top:45px;
  left:40px;
  box-shadow:0 0 20px #00ff66;
}

/* 3D rotation */
@keyframes rotateCam{
  0%{transform:rotateY(0deg);}
  100%{transform:rotateY(360deg);}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* BRAND */
.brand{
  margin-top:20px;
  font-family:Dancing Script;
  font-size:32px;
  color:#00ff66;
  text-shadow:0 0 20px rgba(0,255,102,0.5);
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #00ff66;}
  to{text-shadow:0 0 25px #00ff66;}
}

/* LOADING BAR */
.loading-bar{
  width:280px;
  height:6px;
  margin-top:25px;
  background:rgba(255,255,255,0.1);
  border-radius:50px;
  overflow:hidden;
  position:relative;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff66,#00c853);
  border-radius:50px;
  transition:0.2s;
  box-shadow:0 0 20px rgba(0,255,102,0.7);
}

/* background camera overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=2000&q=80");
  background-size:cover;
  opacity:0.08;
  filter:blur(2px);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,255,102,0.1), transparent 60%);
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(0,255,102,0.2);
  backdrop-filter:blur(22px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#00ff66;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:72px;
  color:#00ff66;
}

/* FOLDERS */
.folders{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.folder{
  background:rgba(255,255,255,0.05);
  border:1px solid #00ff66;
  padding:40px;
  text-align:center;
  border-radius:16px;
  cursor:pointer;
  transition:0.4s;
}

.folder:hover{
  transform:translateY(-8px);
  background:rgba(0,255,102,0.1);
}

/* GALLERY */
.gallery{
  display:none;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
  margin-top:30px;
}

.gallery.active{
  display:grid;
}

.card img{
  width:100%;
  height:270px;
  object-fit:cover;
  border-radius:14px;
  transition:0.5s;
}

.card img:hover{
  transform:scale(1.1);
}

/* CONTACT */
.contact-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  background:rgba(255,255,255,0.06);
  border-radius:50px;
  padding:12px;
  backdrop-filter:blur(20px);
}

.contact-bar a{
  color:#ddd;
  text-decoration:none;
  font-size:12px;
  padding:10px 14px;
  border-radius:30px;
}

.contact-bar a:hover{
  background:#00ff66;
  color:#000;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">

  <div class="camera-3d">
    <div class="camera-body"></div>
    <div class="lens"></div>
  </div>

  <div class="brand">Dillu Captures</div>

  <div class="loading-bar">
    <div class="progress" id="progress"></div>
  </div>

</div>

<!-- NAV -->
<nav>
  <div class="logo">Dillu Captures</div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Dillu Captures</h1>
  <p>Luxury cinematic photography capturing emotion</p>
</div>

<!-- PORTFOLIO -->
<section>
  <h2>Folders</h2>

  <div class="folders">
    <div class="folder" onclick="openFolder('kids')">Kids</div>
    <div class="folder" onclick="openFolder('haldi')">Haldi</div>
    <div class="folder" onclick="openFolder('outdoor')">Outdoor</div>
  </div>

  <div class="gallery" id="kids">
    <div class="card"><img src="Images/kids/1.jpg"></div>
    <div class="card"><img src="Images/kids/2.jpg"></div>
  </div>

  <div class="gallery" id="haldi">
    <div class="card"><img src="Images/haldi/1.jpg"></div>
  </div>

  <div class="gallery" id="outdoor">
    <div class="card"><img src="Images/outdoor/1.jpg"></div>
  </div>
</section>

<!-- CONTACT -->
<div class="contact-bar">
  <a href="tel:+919700034138">Call</a>
  <a href="https://wa.me/919700034138">WhatsApp</a>
  <a href="mailto:dillucapture@gmail.com">Gmail</a>
</div>

<script>

/* LOADING ANIMATION */
let p=0;
let bar=document.getElementById("progress");

let load=setInterval(()=>{
  p++;
  bar.style.width=p+"%";

  if(p>=100){
    clearInterval(load);
    setTimeout(()=>{
      document.getElementById("loader").classList.add("hidden");
    },500);
  }
},20);

/* FOLDERS */
function openFolder(id){
  document.querySelectorAll(".gallery").forEach(g=>g.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
