<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Montserrat;
  color:#fff;
  background:#000;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  border-radius:18px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.logo{
  font-family:Dancing Script;
  font-size:26px;
  color:#f5c542;
}

nav a{
  color:#ddd;
  margin:0 10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1{
  font-family:Dancing Script;
  font-size:70px;
  color:#f5c542;
}

/* SECTION */
section{
  padding:70px 8% 50px;
}

h2{
  color:#f5c542;
  margin-bottom:15px;
}

/* FOLDERS */
.folder-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.folder{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(245,197,66,0.3);
  padding:30px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:.3s;
}

.folder::before{
  content:"";
  position:absolute;
  top:-8px;
  left:20px;
  width:45px;
  height:14px;
  background:#f5c542;
  border-radius:6px 6px 0 0;
}

.folder:hover{
  transform:translateY(-6px);
  background:rgba(245,197,66,0.15);
}

.folder.active{
  background:rgba(245,197,66,0.2);
}

/* 🔥 GALLERY FIX (MASONRY STYLE) */
.gallery-wrap{
  grid-column:1/-1;
}

.gallery{
  column-count:5; /* 🔥 5 vertical columns */
  column-gap:12px;
  margin-top:20px;
}

/* CARD */
.card{
  break-inside:avoid;
  margin-bottom:12px;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* IMAGE PERFECT FIT */
.card img{
  width:100%;
  height:auto;   /* 🔥 keeps original ratio */
  display:block;
  border-radius:20px;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTACT */
.contact{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.contact-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(245,197,66,0.3);
  text-decoration:none;
  color:#fff;
}

.contact-btn:hover{
  background:rgba(245,197,66,0.2);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dillu Captures</div>
  <div>
    <a onclick="go('home')">Home</a>
    <a onclick="go('about')">About</a>
    <a onclick="go('portfolio')">Portfolio</a>
    <a onclick="go('contact')">Contact</a>
  </div>
</nav>

<div class="hero" id="home">
  <h1>Dillu Captures</h1>
</div>

<section id="about">
  <h2>About</h2>
  <p>Premium cinematic photography studio.</p>
</section>

<section id="portfolio">
  <h2>Folders</h2>

  <div class="folder-grid">
    <div class="folder" onclick="openFolder(this,'kids')">📸 Kids</div>
    <div class="folder" onclick="openFolder(this,'maternity')">🤰 Maternity</div>
  </div>

  <!-- DATA -->
  <div id="kids" hidden>
    <div class="gallery">
      <div class="card"><img src="https://picsum.photos/400/300?1" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/300/500?2" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/400/250?3" onclick="openImg(this)"></div>
      <div class="card"><img src="https://picsum.photos/350/600?4" onclick="openImg(this)"></div>
    </div>
  </div>

</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="contact">
    <a class="contact-btn" href="tel:+919700034138">📞 Call</a>
    <a class="contact-btn" href="https://wa.me/919700034138">💬 WhatsApp</a>
    <a class="contact-btn" href="https://www.instagram.com/dillu_captures/" target="_blank">📸 Instagram</a>
    <a class="contact-btn" href="mailto:dillucapture@gmail.com">✉ Gmail</a>
  </div>
</section>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>
function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

let activeBox=null;

function openFolder(el,id){

  if(activeBox){
    activeBox.remove();
    activeBox=null;
  }

  if(el.classList.contains("active")){
    el.classList.remove("active");
    return;
  }

  document.querySelectorAll(".folder").forEach(f=>f.classList.remove("active"));
  el.classList.add("active");

  let content=document.getElementById(id).innerHTML;

  let wrap=document.createElement("div");
  wrap.className="gallery-wrap";
  wrap.innerHTML=content;

  el.insertAdjacentElement("afterend",wrap);

  activeBox=wrap;
}

function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightImg").src=img.src;
}
</script>

</body>
</html>
