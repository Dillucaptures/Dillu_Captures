<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures Admin Enabled</title>

<style>
body{background:#000;color:#fff;font-family:sans-serif;text-align:center}
button{padding:8px 14px;margin:6px;border:none;border-radius:6px;cursor:pointer}
.upload-btn{background:#eab308;color:#000}
.delete-btn{background:red;color:#fff;position:absolute;top:5px;right:5px}
.gallery{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.card{position:relative}
img{width:180px;height:120px;object-fit:cover;border-radius:8px}
</style>
</head>

<body>
<h1>Dillu Captures (Admin Control)</h1>

<!-- FOLDERS -->
<div id="folders">
  <h2>Newborn</h2>
  <button class="upload-btn" onclick="uploadImage('newborn')">Upload</button>
  <div class="gallery" id="newborn"></div>

  <h2>Kids</h2>
  <button class="upload-btn" onclick="uploadImage('kids')">Upload</button>
  <div class="gallery" id="kids"></div>

  <h2>Haldi</h2>
  <button class="upload-btn" onclick="uploadImage('haldi')">Upload</button>
  <div class="gallery" id="haldi"></div>

  <h2>Temple</h2>
  <button class="upload-btn" onclick="uploadImage('temple')">Upload</button>
  <div class="gallery" id="temple"></div>

  <h2>Portrait</h2>
  <button class="upload-btn" onclick="uploadImage('portrait')">Upload</button>
  <div class="gallery" id="portrait"></div>
</div>

<script>
const ADMIN_PASSWORD = "1234"; // CHANGE THIS

function checkPassword(){
  const pass = prompt("Enter Admin Password:");
  return pass === ADMIN_PASSWORD;
}

function uploadImage(folder){
  if(!checkPassword()){
    alert("Wrong Password");
    return;
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
      const imgSrc = event.target.result;
      addImageToFolder(folder, imgSrc);
      saveToLocal(folder, imgSrc);
    }

    reader.readAsDataURL(file);
  }

  input.click();
}

function addImageToFolder(folder, src){
  const container = document.getElementById(folder);

  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  const delBtn = document.createElement('button');
  delBtn.innerText = 'X';
  delBtn.className = 'delete-btn';

  delBtn.onclick = () => {
    if(!checkPassword()){
      alert("Wrong Password");
      return;
    }
    card.remove();
    removeFromLocal(folder, src);
  }

  card.appendChild(img);
  card.appendChild(delBtn);
  container.appendChild(card);
}

function saveToLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data.push(src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function removeFromLocal(folder, src){
  let data = JSON.parse(localStorage.getItem(folder)) || [];
  data = data.filter(img => img !== src);
  localStorage.setItem(folder, JSON.stringify(data));
}

function loadImages(){
  ['newborn','kids','haldi','temple','portrait'].forEach(folder => {
    let data = JSON.parse(localStorage.getItem(folder)) || [];
    data.forEach(src => addImageToFolder(folder, src));
  });
}

loadImages();
</script>

</body>
</html>
