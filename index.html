<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* INTRO */
.intro {
  position:fixed;
  width:100%;
  height:100%;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.intro-text {
  font-family:'Playfair Display';
  font-size:42px;
  opacity:0;
  transform:translateY(30px);
  animation:introText 1.5s forwards;
}
@keyframes introText {
  to {opacity:1; transform:translateY(0);}
}
.intro.hide {
  animation:fadeOut 1.2s forwards;
}
@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* NAV */
header {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

header h1 { font-family:'Playfair Display'; }

nav a {
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
}

/* ===== ANIMATED TOGGLE ===== */
.theme-toggle {
  width:60px;
  height:30px;
  background:var(--glass);
  border-radius:30px;
  position:relative;
  cursor:pointer;
  margin-left:20px;
  display:flex;
  align-items:center;
  padding:4px;
  transition:0.4s;
}

.toggle-circle {
  width:22px;
  height:22px;
  border-radius:50%;
  background:#111;
  position:absolute;
  left:4px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  color:#fff;
  transition:0.4s cubic-bezier(.68,-0.55,.27,1.55);
}

/* SUN STATE */
body:not(.dark) .toggle-circle {
  left:4px;
  background:#111;
  transform:rotate(0deg);
}

/* MOON STATE */
body.dark .toggle-circle {
  left:34px;
  background:#f5f5f5;
  color:#111;
  transform:rotate(360deg);
}

/* ICON ANIMATION */
.toggle-circle span {
  transition:0.4s;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  min-height:100vh;
  padding:120px 60px;
  position:relative;
}
.hero::after {
  content:"";
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover;
}
.hero-text {
  max-width:500px;
  animation:fadeUp 1.2s;
}
.hero-text h2 {
  font-family:'Playfair Display';
  font-size:48px;
}
@keyframes fadeUp {
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* SECTIONS */
section { padding:120px 60px; }

.about {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.about img {
  width:100%;
  border-radius:20px;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.gallery img {
  width:100%;
  border-radius:15px;
}

/* BUTTON */
.btn {
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 28px;
  border-radius:30px;
  background:var(--glass);
  text-decoration:none;
  color:var(--text);
  margin:10px;
}

/* CALENDAR (same as yours) */
.calendar { max-width:420px; margin:40px auto 0; text-align:center; }
.calendar-header { display:flex; justify-content:space-between; align-items:center; }
.calendar-header button { background:var(--glass); border:none; padding:8px 14px; border-radius:10px; cursor:pointer; }
.weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-top:15px; font-size:12px; opacity:0.6; }
.days { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; margin-top:10px; }
.day { padding:12px; border-radius:10px; background:var(--glass); cursor:pointer; }
.day:hover { background:#111; color:#fff; }
.day.today { border:1px solid #111; }
.day.selected { background:#111; color:#fff; }
.day.disabled { opacity:0.3; pointer-events:none; }
.slots { margin-top:20px; }
.slot { display:inline-block; padding:10px 15px; margin:6px; border-radius:20px; background:var(--glass); cursor:pointer; }
.slot:hover { background:#111; color:#fff; }

/* MOBILE */
@media(max-width:768px){
  header { padding:15px 20px; }
  .hero { flex-direction:column; text-align:center; padding:100px 20px; }
  .hero::after { width:100%; height:50%; }
  .hero-text { margin-top:55vh; }
  .about { grid-template-columns:1fr; }
  section { padding:100px 20px; }
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <div class="intro-text">Dillu Captures</div>
</div>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>

    <!-- NEW TOGGLE -->
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-circle">
        <span id="icon">☀️</span>
      </div>
    </div>

  </nav>
</header>

<!-- REST SAME -->
<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<!-- KEEP YOUR OTHER SECTIONS SAME -->

<script>

/* INTRO */
window.onload = () => {
  setTimeout(()=> document.getElementById("intro").classList.add("hide"),1800);
};

/* THEME TOGGLE WITH ICON SWITCH */
function toggleTheme(){
  document.body.classList.toggle("dark");

  const icon = document.getElementById("icon");

  if(document.body.classList.contains("dark")){
    icon.textContent = "🌙";
  } else {
    icon.textContent = "☀️";
  }
}

</script>

</body>
</html>
