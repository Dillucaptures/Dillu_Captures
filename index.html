<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FORCE LIGHT MODE SUPPORT -->
<meta name="color-scheme" content="light dark">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s ease;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  backdrop-filter: blur(15px);
  background: var(--glass);
  z-index: 1000;
}

header h1 {
  font-family: 'Playfair Display';
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--text);
}

/* TOGGLE BUTTON */
.toggle {
  margin-left: 20px;
  cursor: pointer;
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* SECTIONS */
section {
  padding: 120px 60px;
  position: relative;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  min-height: 100vh;
}

/* IMAGE RIGHT */
.hero::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 50%;
  height: 100%;
  background: url('Images/1776695215852.webp') center/cover no-repeat;
  z-index: -2;
}

/* FADE */
.hero::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 50%;
  height: 100%;

  background:
    radial-gradient(circle at 70% 50%,
    rgba(255,255,255,0) 30%,
    rgba(255,255,255,0.3) 55%,
    rgba(255,255,255,0.8) 80%,
    rgba(255,255,255,1) 100%),
    linear-gradient(to top,
    rgba(255,255,255,1) 0%,
    rgba(255,255,255,1) 10%,
    rgba(255,255,255,0.6) 20%,
    rgba(255,255,255,0) 35%);
}

/* TEXT */
.hero-text {
  max-width: 500px;
}

.hero-text h2 {
  font-size: 48px;
  font-family: 'Playfair Display';
  margin-bottom: 20px;
}

.hero-text p {
  opacity: 0.7;
}

/* GLASS */
.glass {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
}

/* ABOUT */
.about {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.about img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 20px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
}

/* CONTACT */
.contact {
  text-align: center;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 30px;
  background: var(--glass);
  color: var(--text);
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {

  header {
    padding: 15px 20px;
  }

  section {
    padding: 100px 20px;
  }

  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero::after {
    width: 100%;
    height: 50%;
  }

  .hero::before {
    width: 100%;
    height: 50%;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.2),
      rgba(255,255,255,1)
    );
  }

  .hero-text {
    margin-top: 55vh;
  }

  .hero-text h2 {
    font-size: 32px;
  }

  .about {
    grid-template-columns: 1fr;
  }

}

</style>
</head>

<body>

<header>
  <h1>Dillu_Captures</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>

    <!-- TOGGLE -->
    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion, elegance, and storytelling.</p>
  </div>
</section>

<section id="about" class="about">
  <img src="Images/IMG_1164.webp">
  <div class="glass">
    <h2>About Me</h2>
    <p>I am a professional photographer specializing in portraits, weddings, and cinematic storytelling.</p>
  </div>
</section>

<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>
  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>
</section>

<section class="contact">
  <h2>Book a Session</h2>
  <a class="btn" href="https://wa.me/919700034138">WhatsApp</a>
  <a class="btn" href="#">Instagram</a>
</section>

<script>
// FORCE LIGHT MODE FIRST (fix mobile issue)
document.body.classList.remove("dark");

// TOGGLE
function toggleTheme() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
