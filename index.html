<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}
body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* NAV */
header {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

nav a {
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
}

/* TOGGLE */
.theme-toggle {
  width:60px; height:30px;
  background:var(--glass);
  border-radius:30px;
  position:relative;
  cursor:pointer;
  margin-left:20px;
  overflow:hidden;
}
.toggle-circle {
  width:22px; height:22px;
  border-radius:50%;
  background:#111;
  position:absolute;
  left:4px; top:4px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  transition:.4s cubic-bezier(.68,-0.55,.27,1.55);
}
body.dark .toggle-circle {
  left:34px;
  background:#fff;
  color:#111;
  transform:rotate(360deg);
}

/* RIPPLE */
.ripple {
  position:absolute;
  width:10px; height:10px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  transform:scale(0);
  opacity:0;
  filter:blur(8px);
}
.ripple.animate { animation:ripple 0.8s ease-out; }
@keyframes ripple {
  0%{transform:scale(0);opacity:.6;}
  100%{transform:scale(10);opacity:0;}
}

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:120px 60px;
}

/* ================= PARALLAX GALLERY ================= */
.gallery {
  column-count:3;
  column-gap:20px;
  padding:120px 60px;
}

.gallery-item {
  break-inside:avoid;
  margin-bottom:20px;
  overflow:hidden;
  border-radius:18px;
  position:relative;
}

.gallery-item img {
  width:100%;
  display:block;
  transform:scale(1.1);
  transition:transform 0.6s ease-out;
  will-change:transform;
}

/* subtle hover lift */
.gallery-item:hover img {
  transform:scale(1.2);
}

/* MOBILE */
@media(max-width:900px){
  .gallery { column-count:2; }
}
@media(max-width:600px){
  .gallery { column-count:1; padding:100px 20px; }
  header { padding:15px 20px; }
}

/* SECTION */
section { padding:120px 60px; }

</style>
</head>

<body>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>

    <div class="theme-toggle" onclick="toggleTheme(event)">
      <div class="ripple"></div>
      <div class="toggle-circle"><span id="icon">☀️</span></div>
    </div>
  </nav>
</header>

<section class="hero">
  <h2 style="font-size:48px;font-family:Playfair Display;">Capturing Timeless Moments</h2>
</section>

<!-- PARALLAX GALLERY -->
<section id="gallery">
  <div class="gallery">

    <div class="gallery-item"><img src="Images/Kids/IMG_1902.webp"></div>
    <div class="gallery-item"><img src="Images/Kids/IMG_5332.webp"></div>
    <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4216.webp"></div>
    <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4363.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3234.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3390.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3037.webp"></div>

  </div>
</section>

<script>

/* THEME + RIPPLE */
function toggleTheme(e){
  const toggle = e.currentTarget;
  const ripple = toggle.querySelector(".ripple");

  ripple.classList.remove("animate");
  void ripple.offsetWidth;

  const rect = toggle.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left)+"px";
  ripple.style.top = (e.clientY - rect.top)+"px";

  ripple.classList.add("animate");

  document.body.classList.toggle("dark");
  document.getElementById("icon").textContent =
    document.body.classList.contains("dark") ? "🌙" : "☀️";
}

/* ================= PARALLAX SCROLL ================= */
const items = document.querySelectorAll(".gallery-item img");

window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;

  items.forEach((img, i) => {
    const speed = (i % 5 + 1) * 0.03; // different depth
    img.style.transform =
      `translateY(${scrollY * speed}px) scale(1.1)`;
  });
});

</script>

</body>
</html>
