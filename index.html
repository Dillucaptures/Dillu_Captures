<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Montserrat;
  background:#000;
  color:#fff;
}

/* GLASS UI */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:center;
}
nav div{
  display:flex;
  gap:20px;
}
a{
  color:#aaa;
  text-decoration:none;
}
a:hover{color:#fff}

/* SECTIONS */
section{
  max-width:1100px;
  margin:100px auto;
  padding:20px;
}

/* GALLERY */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.tab{
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  background:#111;
}
.tab.active{background:gold;color:black}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  position:relative;
  text-align:center;
}
.card img{
  width:100%;
  border-radius:15px;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:5px;
  font-size:12px;
}

.upload{background:gold;color:black}
.delete{background:red;color:white}
.download{background:#2563eb;color:white}
.addFolder{background:green;color:white}

.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CONTACT */
.contact a{color:gold}

/* MOBILE */
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<nav>
  <div class="glass">
    <a href="#home">Home</a>
    <a href="#gallery">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section id="home" class="glass">
  <h1>Dillu Captures</h1>
  <p>Premium photography with emotional storytelling.</p>
</section>

<section id="gallery" class="glass">
  <h2>Gallery</h2>

  <div class="top-actions">
    <div class="tabs" id="tabs"></div>
    <button class="btn addFolder" onclick="addFolder()">+ Folder</button>
  </div>

  <div id="folders"></div>
</section>

<section id="about" class="glass">
  <h2>About</h2>
  <p>Professional photographer capturing real emotions.</p>
</section>

<section id="contact" class="glass contact">
  <h2>Contact</h2>
  <p>Email: <a href="#">dillucapture@gmail.com</a></p>
  <p>Phone: <a href="#">+91 9700034138</a></p>
</section>

<script>
const ADMIN_PASSWORD = "1234";

/* DATA */
let data = JSON.parse(localStorage.getItem("galleryData")) || {
  folders:{ All:[] },
  active:"All"
};

/* SAVE */
function save(){
  localStorage.setItem("galleryData",JSON.stringify(data));
}

/* PASSWORD CHECK */
function checkAdmin(){
  let pass = prompt("Enter Admin Password");
  return pass === ADMIN_PASSWORD;
}

/* DOWNLOAD FUNCTION */
function downloadImage(base64, index){
  const link = document.createElement("a");
  link.href = base64;
  link.download = "dillu_capture_" + index + ".jpg";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* RENDER */
function render(){
  const tabs = document.getElementById("tabs");
  const folders = document.getElementById("folders");

  tabs.innerHTML="";
  folders.innerHTML="";

  Object.keys(data.folders).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab "+(data.active===name?"active":"");
    tab.innerText=name;
    tab.onclick=()=>{data.active=name;render();}
    tabs.appendChild(tab);

    if(data.active===name){
      let container=document.createElement("div");

      let header=document.createElement("div");
      header.innerHTML=`
        <h3>${name}</h3>
        <button class="btn upload" onclick="uploadImage('${name}')">Upload</button>
      `;
      container.appendChild(header);

      let grid=document.createElement("div");
      grid.className="grid";

      data.folders[name].forEach((img,i)=>{
        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
          <img src="${img}">
          <div>
            <button class="btn download" onclick="downloadImage('${img}',${i})">Download</button>
            <button class="btn delete" onclick="deleteImage('${name}',${i})">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });

      container.appendChild(grid);
      folders.appendChild(container);
    }
  });
}

/* UPLOAD */
function uploadImage(folder){
  if(!checkAdmin()) return alert("Wrong password");

  let input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();

    reader.onload=function(){
      data.folders[folder].push(reader.result);
      save();
      render();
    };

    reader.readAsDataURL(file);
  };

  input.click();
}

/* DELETE */
function deleteImage(folder,index){
  if(!checkAdmin()) return alert("Wrong password");

  data.folders[folder].splice(index,1);
  save();
  render();
}

/* ADD FOLDER */
function addFolder(){
  if(!checkAdmin()) return alert("Wrong password");

  let name=prompt("Folder name?");
  if(!name) return;

  if(data.folders[name]){
    alert("Folder exists");
    return;
  }

  data.folders[name]=[];
  data.active=name;
  save();
  render();
}

/* INIT */
render();
</script>

</body>
</html>
