<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Montserrat;
  background:linear-gradient(135deg,#000,#020617);
  color:#fff;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  z-index:1000;
}
nav div{
  margin-top:10px;
  display:flex;
  gap:25px;
  padding:12px 25px;
  border-radius:50px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
}

/* LINKS */
a{
  color:#aaa;
  text-decoration:none;
}
a:hover{color:#fff}

/* SECTION */
section{
  max-width:1100px;
  margin:110px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
}

/* HERO */
#home{text-align:center;}
#home h1{
  font-size:40px;
  background:linear-gradient(90deg,gold,orange);
  -webkit-background-clip:text;
  color:transparent;
}

/* TABS */
.tabs{display:flex;gap:10px;flex-wrap:wrap;}
.tab{
  padding:8px 16px;
  border-radius:20px;
  background:#111;
  cursor:pointer;
}
.tab.active{background:gold;color:black}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{text-align:center;}
.card img{
  width:100%;
  border-radius:15px;
}

/* BUTTONS */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:5px;
  font-size:12px;
}

.upload{background:gold;color:black}
.delete{background:red;color:white}
.download{background:#2563eb;color:white}
.addFolder{background:#22c55e;color:white}

/* DROP ZONE */
.drop{
  border:2px dashed gold;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin-bottom:10px;
}

/* PROGRESS */
.progressBox{display:none;margin-top:10px;}
.progressBar{
  height:10px;
  width:0%;
  background:gold;
  border-radius:10px;
}

/* CONTACT */
.contact-icons{
  display:flex;
  gap:15px;
  margin-top:15px;
  flex-wrap:wrap;
}
.contact-icons a{
  padding:10px 15px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  gap:8px;
  align-items:center;
}
.contact-icons a:hover{
  background:gold;
  color:black;
}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<nav>
  <div>
    <a href="#home">Home</a>
    <a href="#gallery">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section id="home">
  <h1>Dillu Captures</h1>
  <p>Premium photography with emotional storytelling ✨</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>

  <div style="display:flex;justify-content:space-between;">
    <div class="tabs" id="tabs"></div>
    <button class="btn addFolder" onclick="addFolder()">+ Folder</button>
  </div>

  <div id="folders"></div>
</section>

<section id="about">
  <h2>About</h2>
  <p>Dillu Captures specializes in newborn, kids, portraits and events photography.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p><i class="fas fa-envelope"></i> Dillucapture@gmail.com</p>
  <p><i class="fas fa-phone"></i> +91 9700034138</p>

  <div class="contact-icons">
    <a href="mailto:Dillucapture@gmail.com"><i class="fas fa-envelope"></i>Email</a>
    <a href="tel:9700034138"><i class="fas fa-phone"></i>Call</a>
    <a href="https://wa.me/919700034138"><i class="fab fa-whatsapp"></i>WhatsApp</a>
    <a href="#"><i class="fab fa-instagram"></i>Instagram</a>
  </div>
</section>

<script>
const ADMIN_PASSWORD="1234";

let data=JSON.parse(localStorage.getItem("galleryData"))||{
  folders:{All:[]},
  active:"All"
};

function save(){
  localStorage.setItem("galleryData",JSON.stringify(data));
}

function checkAdmin(){
  return prompt("Enter Admin Password")===ADMIN_PASSWORD;
}

function downloadImage(base64,i){
  let a=document.createElement("a");
  a.href=base64;
  a.download="dillu_"+i+".jpg";
  a.click();
}

function render(){
  let tabs=document.getElementById("tabs");
  let folders=document.getElementById("folders");

  tabs.innerHTML="";
  folders.innerHTML="";

  Object.keys(data.folders).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab "+(data.active===name?"active":"");
    tab.innerText=name;
    tab.onclick=()=>{data.active=name;render();}
    tabs.appendChild(tab);

    if(data.active===name){
      let container=document.createElement("div");

      container.innerHTML=`
        <h3>${name}</h3>

        <div class="drop" id="dropZone">
          Drag & Drop Images OR 
          <button class="btn upload" onclick="uploadImage('${name}')">Browse</button>
        </div>

        <div class="progressBox" id="progressBox">
          <div style="background:#222;border-radius:10px;">
            <div class="progressBar" id="progressBar"></div>
          </div>
          <small id="progressText"></small>
        </div>
      `;

      let grid=document.createElement("div");
      grid.className="grid";

      data.folders[name].forEach((img,i)=>{
        let card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
          <img src="${img}">
          <div>
            <button class="btn download" onclick="downloadImage('${img}',${i})">Download</button>
            <button class="btn delete" onclick="deleteImage('${name}',${i})">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });

      container.appendChild(grid);
      folders.appendChild(container);

      setupDragDrop(name);
    }
  });
}

function setupDragDrop(folder){
  let drop=document.getElementById("dropZone");

  drop.ondragover=e=>{
    e.preventDefault();
    drop.style.background="rgba(255,215,0,0.1)";
  };

  drop.ondragleave=()=>drop.style.background="transparent";

  drop.ondrop=e=>{
    e.preventDefault();
    drop.style.background="transparent";
    if(!checkAdmin()) return alert("Wrong password");
    handleFiles(e.dataTransfer.files,folder);
  };
}

function uploadImage(folder){
  if(!checkAdmin()) return alert("Wrong password");

  let input=document.createElement("input");
  input.type="file";
  input.multiple=true;
  input.accept="image/*";

  input.onchange=e=>handleFiles(e.target.files,folder);
  input.click();
}

function handleFiles(files,folder){
  let bar=document.getElementById("progressBar");
  let box=document.getElementById("progressBox");
  let text=document.getElementById("progressText");

  box.style.display="block";

  let total=files.length;
  let count=0;

  Array.from(files).forEach(file=>{
    let reader=new FileReader();

    reader.onload=()=>{
      data.folders[folder].push(reader.result);
      count++;

      let percent=Math.round((count/total)*100);
      bar.style.width=percent+"%";
      text.innerText=`Uploading ${count}/${total}`;

      if(count===total){
        save();
        render();
      }
    };

    reader.readAsDataURL(file);
  });
}

function deleteImage(folder,i){
  if(!checkAdmin()) return alert("Wrong password");

  data.folders[folder].splice(i,1);
  save();
  render();
}

function addFolder(){
  if(!checkAdmin()) return alert("Wrong password");

  let name=prompt("Folder name?");
  if(!name) return;

  if(data.folders[name]) return alert("Exists");

  data.folders[name]=[];
  data.active=name;
  save();
  render();
}

render();
</script>

</body>
</html>
