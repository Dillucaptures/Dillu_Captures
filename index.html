<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Montserrat;
  background:#000;
  color:#fff;
}
main { padding:80px 20px; max-width:1200px; margin:auto; }

h2 { margin-bottom:10px; }

.upload-box {
  border:2px dashed #444;
  padding:20px;
  text-align:center;
  margin-bottom:30px;
  display:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  position:relative;
}

.card img {
  width:100%;
  border-radius:15px;
}

.delete-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<main>

<h2>Gallery</h2>

<div id="uploadBox" class="upload-box">
  <input type="file" id="fileInput" multiple>
</div>

<button id="loginBtn">Login as Owner</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<div class="gallery" id="gallery"></div>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script type="module">

// 🔥 CONFIG (replace with yours)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const gallery = document.getElementById("gallery");

let user = null;

// 🔐 AUTH
loginBtn.onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (u) => {
  user = u;

  if (user && user.email === "your-email@gmail.com") {
    uploadBox.style.display = "block";
    logoutBtn.style.display = "inline-block";
    loginBtn.style.display = "none";
  } else {
    uploadBox.style.display = "none";
    logoutBtn.style.display = "none";
    loginBtn.style.display = "inline-block";
  }

  loadImages();
});

// 📤 UPLOAD
fileInput.addEventListener("change", async (e) => {
  const files = e.target.files;

  for (let file of files) {
    const storageRef = ref(storage, "gallery/" + Date.now() + file.name);

    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "photos"), {
      url: url,
      path: storageRef.fullPath
    });
  }

  loadImages();
});

// 📥 LOAD IMAGES
async function loadImages() {
  gallery.innerHTML = "";

  const snapshot = await getDocs(collection(db, "photos"));

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${data.url}">
      <button class="delete-btn">×</button>
    `;

    const delBtn = card.querySelector(".delete-btn");

    // Show delete only for owner
    if (user && user.email === "your-email@gmail.com") {
      delBtn.style.display = "block";
    }

    delBtn.onclick = async () => {
      await deleteObject(ref(storage, data.path));
      await deleteDoc(doc(db, "photos", docSnap.id));
      loadImages();
    };

    gallery.appendChild(card);
  });
}

</script>

</body>
</html>
